<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%;font-family:Arial,sans-serif;background:#000;overflow:hidden}
        body{background-image:url('https://avatars.mds.yandex.net/get-entity_search/2356618/969838143/orig');background-size:cover;background-position:center;display:flex;align-items:flex-start;justify-content:center;position:relative}
        body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.65);z-index:0}
        .app{position:relative;z-index:1;width:100%;max-width:100%;height:100vh;display:flex;flex-direction:column}
        .top-btn{display:block;width:calc(100% - 32px);margin:20px 16px 0;padding:20px 0;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:16px;color:#fff;font-size:20px;font-weight:700;cursor:pointer;backdrop-filter:blur(8px);text-align:center;flex-shrink:0}
        .top-btn:active{transform:scale(.98);background:rgba(255,255,255,0.2)}
        .content{flex:1;overflow:hidden;padding:10px 16px 0}
        #mainPage{display:flex;flex-direction:column;height:100%}
        .coins-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;padding-bottom:10px}
        .coin-item{display:flex;align-items:center;padding:10px 16px;background:rgba(255,255,255,0.05);backdrop-filter:blur(4px);border-radius:12px;border:1px solid rgba(255,255,255,0.06);cursor:pointer;gap:10px}
        .coin-item:active{transform:scale(.98);background:rgba(255,255,255,0.1)}
        .coin-number{color:rgba(255,255,255,0.25);font-size:12px;font-weight:700;width:20px;flex-shrink:0}
        .coin-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
        .coin-icon.btc{background:#f7931a}.coin-icon.eth{background:#627eea}.coin-icon.bnb{background:#f0b90b}.coin-icon.xrp{background:#00aae4}.coin-icon.sol{background:#9945ff}.coin-icon.trx{background:#ef0027}.coin-icon.hype{background:#8b5cf6}
        .coin-info{flex:1;min-width:0}
        .coin-name{color:#fff;font-size:15px;font-weight:600}
        .coin-symbol{color:rgba(255,255,255,0.35);font-size:10px;text-transform:uppercase}
        .coin-price{color:#fff;font-size:15px;font-weight:600;white-space:nowrap;min-width:70px;text-align:right}
        .coin-change-24h{font-size:13px;font-weight:600;min-width:55px;text-align:right}
        .coin-change-24h.green{color:#4caf50}.coin-change-24h.red{color:#f44336}
        .loading{color:rgba(255,255,255,0.5);text-align:center;padding:30px 0;font-size:14px}
        #indicatorsPage{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e27;z-index:999;padding:20px;flex-direction:column;align-items:center;overflow-y:auto}
        #indicatorsPage .back-btn{position:absolute;top:16px;left:16px;z-index:10;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:20px;padding:6px 14px;border-radius:20px;cursor:pointer}
        #indicatorsPage .back-btn:active{transform:scale(.95);opacity:.7}
        .indicator-box{width:100%;max-width:600px;margin:80px 0 0 0;padding:20px 15px 15px;background:linear-gradient(135deg,#1a1a3e,#0a0e27);border-radius:16px;border:2px solid rgba(255,193,7,0.3);box-shadow:0 8px 32px rgba(255,193,7,0.15);margin-bottom:20px}
        .indicator-title{color:#ffc107;font-size:16px;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;text-align:center}
        .indicator-subtitle{color:rgba(255,255,255,0.5);font-size:11px;text-align:center;margin-bottom:10px}
        .indicator-chart-container{width:100%;height:150px;position:relative}
        .indicator-chart-container canvas{width:100%!important;height:100%!important}
        .indicator-stats{display:flex;justify-content:space-between;padding:8px 5px 0;border-top:1px solid rgba(255,255,255,0.05);margin-top:8px}
        .indicator-stat{text-align:center;flex:1}
        .indicator-stat-label{color:rgba(255,255,255,0.4);font-size:9px;text-transform:uppercase;letter-spacing:.5px}
        .indicator-stat-value{font-size:14px;font-weight:700;margin-top:2px}
        .indicator-stat-value.positive{color:#4caf50}.indicator-stat-value.negative{color:#f44336}
        #chartPage{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e27;z-index:999;flex-direction:column;padding:12px}
        #chartPage .back-btn{position:absolute;top:16px;left:16px;z-index:10;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:20px;padding:6px 14px;border-radius:20px;cursor:pointer}
        #chartPage .back-btn:active{transform:scale(.95);opacity:.7}
        #chartPage .chart-header{color:#fff;font-size:20px;font-weight:700;text-align:center;margin-top:50px;margin-bottom:4px}
        #chartPage .chart-price-display{color:#fff;font-size:28px;font-weight:700;text-align:center}
        #chartPage .chart-price-display.touch{color:#ffc107}
        #chartPage .chart-change-display{text-align:center;font-size:16px;font-weight:600;margin-bottom:8px}
        #chartPage .chart-change-display.green{color:#4caf50}#chartPage .chart-change-display.red{color:#f44336}
        #chartPage .chart-container-main{flex:1;width:100%;min-height:0;position:relative;touch-action:none}
        #chartPage .chart-container-main canvas{width:100%!important;height:100%!important;touch-action:none}
        #chartPage .timeframes{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:8px 0 12px;flex-shrink:0}
        #chartPage .timeframe-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:rgba(255,255,255,0.6);font-size:11px;font-weight:600;padding:5px 12px;cursor:pointer}
        #chartPage .timeframe-btn.active{background:rgba(255,255,255,0.15);color:#fff;border-color:rgba(255,255,255,0.3)}
        #chartPage .timeframe-btn:active{transform:scale(.95)}
        .crosshair-line-h{pointer-events:none;position:absolute;border-top:1px dashed rgba(255,255,255,0.4);z-index:5}
        .crosshair-line-v{pointer-events:none;position:absolute;border-left:1px dashed rgba(255,255,255,0.4);z-index:5}
        .crosshair-label{pointer-events:none;position:absolute;color:#ffc107;font-size:12px;font-weight:700;background:rgba(0,0,0,0.7);padding:2px 6px;border-radius:4px;z-index:6}
        .status-msg{color:rgba(255,255,255,0.7);text-align:center;padding:10px;font-size:12px}
        .status-msg.error{color:#f44336}
        .status-msg.success{color:#4caf50}
    </style>
</head>
<body>

<div class="app" id="app">
    <button class="top-btn" id="mainBtn">📊 Индикаторы</button>
    <div class="content">
        <div id="mainPage">
            <div class="coins-list" id="coinsList"><div class="loading">Загрузка...</div></div>
        </div>
    </div>
</div>

<div id="indicatorsPage">
    <button class="back-btn" id="backInd">←</button>
    <div class="indicator-box">
        <div class="indicator-title">₿ Bitcoin ETF</div>
        <div class="indicator-subtitle" id="btcUpdateDate">Загрузка данных...</div>
        <div class="indicator-chart-container"><canvas id="btcEtf"></canvas></div>
        <div class="indicator-stats">
            <div class="indicator-stat"><div class="indicator-stat-label">Всего</div><div class="indicator-stat-value" id="btcTotal">--</div></div>
            <div class="indicator-stat"><div class="indicator-stat-label">Средний</div><div class="indicator-stat-value" id="btcAvg">--</div></div>
            <div class="indicator-stat"><div class="indicator-stat-label">Макс приток</div><div class="indicator-stat-value positive" id="btcMax">--</div></div>
            <div class="indicator-stat"><div class="indicator-stat-label">Макс отток</div><div class="indicator-stat-value negative" id="btcMin">--</div></div>
        </div>
    </div>
    <div class="indicator-box">
        <div class="indicator-title">⟠ Ethereum ETF</div>
        <div class="indicator-subtitle" id="ethUpdateDate">Загрузка данных...</div>
        <div class="indicator-chart-container"><canvas id="ethEtf"></canvas></div>
        <div class="indicator-stats">
            <div class="indicator-stat"><div class="indicator-stat-label">Всего</div><div class="indicator-stat-value" id="ethTotal">--</div></div>
            <div class="indicator-stat"><div class="indicator-stat-label">Средний</div><div class="indicator-stat-value" id="ethAvg">--</div></div>
            <div class="indicator-stat"><div class="indicator-stat-label">Макс приток</div><div class="indicator-stat-value positive" id="ethMax">--</div></div>
            <div class="indicator-stat"><div class="indicator-stat-label">Макс отток</div><div class="indicator-stat-value negative" id="ethMin">--</div></div>
        </div>
    </div>
    <div id="statusMessage" class="status-msg"></div>
</div>

<div id="chartPage">
    <button class="back-btn" id="backChart">←</button>
    <div class="chart-header" id="chartTitle">Bitcoin</div>
    <div class="chart-price-display" id="chartPrice">$0.00</div>
    <div class="chart-change-display" id="chartChange">+0.00%</div>
    <div class="chart-container-main" id="chartContainer">
        <canvas id="priceChart"></canvas>
        <div class="crosshair-line-h" id="chH"></div>
        <div class="crosshair-line-v" id="chV"></div>
        <div class="crosshair-label" id="chL">$0.00</div>
    </div>
    <div class="timeframes">
        <button class="timeframe-btn" data-days="0.166">4ч</button>
        <button class="timeframe-btn" data-days="0.5">12ч</button>
        <button class="timeframe-btn active" data-days="1">1д</button>
        <button class="timeframe-btn" data-days="7">1н</button>
        <button class="timeframe-btn" data-days="30">1м</button>
        <button class="timeframe-btn" data-days="90">3м</button>
        <button class="timeframe-btn" data-days="180">6м</button>
        <button class="timeframe-btn" data-days="365">1г</button>
    </div>
</div>

<script>
const $ = id => document.getElementById(id);
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

let chart = null;
let currentCoinId = 'bitcoin';
let currentDays = 1;
let updateInterval = null;
let currentPrice = 0;
let isTouching = false;

const coins = [
    {id:'bitcoin', name:'Bitcoin', symbol:'btc', icon:'₿'},
    {id:'ethereum', name:'Ethereum', symbol:'eth', icon:'⟠'},
    {id:'binancecoin', name:'BNB', symbol:'bnb', icon:'B'},
    {id:'ripple', name:'XRP', symbol:'xrp', icon:'✕'},
    {id:'solana', name:'Solana', symbol:'sol', icon:'◎'},
    {id:'tron', name:'TRX', symbol:'trx', icon:'T'},
    {id:'hyperliquid', name:'Hype', symbol:'hype', icon:'◆'}
];

const coinMap = {};
coins.forEach(c => coinMap[c.id] = c.name);

// --- API КЛЮЧ ДЛЯ SOSOVOLUME ---
const API_KEY = 'SOSO-8cfbe60c06bf4678a1965a440eb24de7';

// Пробуем разные возможные эндпоинты
const API_ENDPOINTS = [
    `https://api.sosovolume.com/api/v1/etf/btc?api_key=${API_KEY}`,
    `https://api.sosovolume.com/v1/etf/btc?api_key=${API_KEY}`,
    `https://api.sosovolume.com/api/etf/btc?api_key=${API_KEY}`,
    `https://api.sosovolume.com/etf/btc?api_key=${API_KEY}`
];

// Хранилище для данных ETF
let etfDataStore = {
    btc: [],
    eth: []
};

// Функция для загрузки данных с API
async function fetchFromAPI(url) {
    try {
        console.log('Попытка загрузить:', url);
        const response = await fetch(url);
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        console.log('Получен ответ:', data);
        return data;
    } catch (error) {
        console.error('Ошибка запроса:', error);
        return null;
    }
}

// Функция для извлечения данных из ответа
function extractDataArray(response) {
    if (!response) return null;
    
    // Проверяем различные возможные структуры
    if (Array.isArray(response)) {
        return response;
    }
    
    if (response.data && Array.isArray(response.data)) {
        return response.data;
    }
    
    if (response.result && Array.isArray(response.result)) {
        return response.result;
    }
    
    if (response.etf && Array.isArray(response.etf)) {
        return response.etf;
    }
    
    // Если есть поле с массивом
    for (let key in response) {
        if (Array.isArray(response[key]) && response[key].length > 0) {
            const firstItem = response[key][0];
            if (firstItem && (firstItem.date || firstItem.net_inflow || firstItem.total_net_inflow)) {
                return response[key];
            }
        }
    }
    
    return null;
}

// Функция загрузки данных с SoSoVolume
async function loadETFData() {
    const statusEl = document.getElementById('statusMessage');
    
    try {
        statusEl.textContent = '⏳ Загрузка данных BTC ETF...';
        statusEl.className = 'status-msg';
        
        // Пробуем загрузить BTC
        let btcData = null;
        for (let endpoint of API_ENDPOINTS) {
            const btcEndpoint = endpoint.replace('btc', 'btc');
            const response = await fetchFromAPI(btcEndpoint);
            if (response) {
                btcData = extractDataArray(response);
                if (btcData && btcData.length > 0) break;
            }
        }
        
        if (btcData && btcData.length > 0) {
            etfDataStore.btc = btcData;
            statusEl.textContent = '✅ BTC данные загружены. Загрузка ETH...';
        } else {
            // Используем тестовые данные, если API не отвечает
            statusEl.textContent = '⚠️ Использую тестовые данные BTC';
            etfDataStore.btc = generateTestData('btc');
        }
        
        // Загружаем ETH
        let ethData = null;
        for (let endpoint of API_ENDPOINTS) {
            const ethEndpoint = endpoint.replace('btc', 'eth');
            const response = await fetchFromAPI(ethEndpoint);
            if (response) {
                ethData = extractDataArray(response);
                if (ethData && ethData.length > 0) break;
            }
        }
        
        if (ethData && ethData.length > 0) {
            etfDataStore.eth = ethData;
            statusEl.textContent = '✅ Все данные загружены!';
            statusEl.className = 'status-msg success';
        } else {
            statusEl.textContent = '⚠️ Использую тестовые данные ETH';
            etfDataStore.eth = generateTestData('eth');
        }
        
        // Обновляем дату
        updateDateInfo();
        
        // Если страница индикаторов открыта, обновляем графики
        if (document.getElementById('indicatorsPage').style.display === 'flex') {
            initETFs();
        }
        
        console.log('Данные ETF загружены:', {
            btc: etfDataStore.btc.length,
            eth: etfDataStore.eth.length
        });
        
        return true;
    } catch (error) {
        console.error('Ошибка загрузки ETF данных:', error);
        statusEl.textContent = '❌ Ошибка загрузки. Использую тестовые данные';
        statusEl.className = 'status-msg error';
        
        // Используем тестовые данные
        etfDataStore.btc = generateTestData('btc');
        etfDataStore.eth = generateTestData('eth');
        updateDateInfo();
        
        if (document.getElementById('indicatorsPage').style.display === 'flex') {
            initETFs();
        }
        return false;
    }
}

// Генерация тестовых данных для демонстрации
function generateTestData(ticker) {
    const data = [];
    const now = new Date();
    const baseValue = ticker === 'btc' ? 50000000 : 20000000;
    
    for (let i = 0; i < 30; i++) {
        const date = new Date(now);
        date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        
        // Генерируем случайный приток/отток
        const random = Math.random() * 2 - 1;
        const value = baseValue * random * (0.5 + Math.random());
        
        data.push({
            date: dateStr,
            net_inflow: Math.round(value),
            ticker: ticker.toUpperCase(),
            value_traded: Math.round(value * (5 + Math.random() * 10))
        });
    }
    
    return data;
}

function updateDateInfo() {
    const updateDate = (elementId, data) => {
        const el = document.getElementById(elementId);
        if (el && data && data.length > 0) {
            const latest = data[0];
            if (latest && latest.date) {
                const date = new Date(latest.date);
                const dateStr = date.toLocaleDateString('ru-RU', { 
                    day: '2-digit', 
                    month: '2-digit', 
                    year: 'numeric' 
                });
                const count = data.length;
                el.textContent = `Притоки / Оттоки за ${count} дней (обновлено: ${dateStr})`;
            }
        }
    };
    
    updateDate('btcUpdateDate', etfDataStore.btc);
    updateDate('ethUpdateDate', etfDataStore.eth);
}

// Навигация
$('mainBtn').onclick = function() {
    $('app').style.display = 'none';
    $('indicatorsPage').style.display = 'flex';
    
    // Если данные еще не загружены или пустые, загружаем
    if (etfDataStore.btc.length === 0 && etfDataStore.eth.length === 0) {
        loadETFData().then(() => {
            initETFs();
        });
    } else {
        initETFs();
    }
};

$('backInd').onclick = function() {
    $('indicatorsPage').style.display = 'none';
    $('app').style.display = 'flex';
};

$('backChart').onclick = function() {
    if (updateInterval) {
        clearInterval(updateInterval);
        updateInterval = null;
    }
    $('chartPage').style.display = 'none';
    $('app').style.display = 'flex';
};

// ETF графики
let etfInstances = {};

function drawETFChart(canvasId, data, color, prefix) {
    const ctx = document.getElementById(canvasId);
    if (!ctx) return;
    
    if (etfInstances[canvasId]) {
        etfInstances[canvasId].destroy();
        delete etfInstances[canvasId];
    }
    
    if (!data || data.length === 0) {
        const parent = ctx.parentElement;
        parent.innerHTML = '<div style="color: rgba(255,255,255,0.5); text-align: center; padding: 30px;">📭 Нет данных</div>';
        return;
    }
    
    const recentData = data.slice(0, 30).reverse();
    const values = recentData.map(d => d.net_inflow || d.total_net_inflow || 0);
    const labels = recentData.map(d => {
        const date = new Date(d.date);
        return date.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
    });
    
    if (values.every(v => v === 0)) {
        const parent = ctx.parentElement;
        parent.innerHTML = '<div style="color: rgba(255,255,255,0.5); text-align: center; padding: 30px;">📊 Нет данных для отображения</div>';
        return;
    }
    
    const total = values.reduce((a, b) => a + b, 0);
    const avg = total / values.length;
    const max = Math.max(...values);
    const min = Math.min(...values);
    
    const updateStat = (id, value, className = '') => {
        const el = document.getElementById(id);
        if (el) {
            el.textContent = value;
            el.className = 'indicator-stat-value ' + className;
        }
    };
    
    const totalM = total / 1e6;
    const avgM = avg / 1e6;
    const maxM = max / 1e6;
    const minM = min / 1e6;
    
    updateStat(prefix + 'Total', (totalM >= 0 ? '+' : '') + totalM.toFixed(1) + 'M', totalM >= 0 ? 'positive' : 'negative');
    updateStat(prefix + 'Avg', '$' + avgM.toFixed(1) + 'M');
    updateStat(prefix + 'Max', '+$' + maxM.toFixed(1) + 'M', 'positive');
    updateStat(prefix + 'Min', '-$' + Math.abs(minM).toFixed(1) + 'M', 'negative');
    
    const barColors = values.map(v => v >= 0 ? color : '#f44336');
    
    etfInstances[canvasId] = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                data: values.map(v => v / 1e6),
                backgroundColor: barColors,
                borderColor: barColors,
                borderWidth: 1,
                borderRadius: 2,
                barPercentage: 0.8,
                categoryPercentage: 0.9
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            const val = context.parsed.y;
                            return (val >= 0 ? 'Приток: +' : 'Отток: ') + val.toFixed(1) + 'M';
                        }
                    }
                }
            },
            scales: {
                x: {
                    grid: { color: 'rgba(255,255,255,0.05)' },
                    ticks: { color: 'rgba(255,255,255,0.2)', maxTicksLimit: 10, font: { size: 7 } }
                },
                y: {
                    grid: { color: 'rgba(255,255,255,0.08)' },
                    ticks: { 
                        color: 'rgba(255,255,255,0.2)', 
                        callback: v => (v >= 0 ? '+' : '') + v + 'M',
                        font: { size: 8 }
                    }
                }
            }
        },
        plugins: [{
            afterDraw: function(chart) {
                const yScale = chart.scales.y;
                const xScale = chart.scales.x;
                const ctx = chart.ctx;
                const zeroY = yScale.getPixelForValue(0);
                
                ctx.save();
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([4, 4]);
                ctx.moveTo(xScale.left, zeroY);
                ctx.lineTo(xScale.right, zeroY);
                ctx.stroke();
                ctx.restore();
                
                ctx.save();
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.font = '8px Arial';
                ctx.textAlign = 'left';
                ctx.fillText('0', xScale.right + 2, zeroY + 3);
                ctx.restore();
            }
        }]
    });
}

function initETFs() {
    drawETFChart('btcEtf', etfDataStore.btc, '#f7931a', 'btc');

// Загрузка данных монет
let cache = null;

async function loadCoins() {
    try {
        if (cache) {
            renderCoins(cache);
        }
        
        const ids = coins.map(c => c.id).join(',');
        const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`);
        
        if (!response.ok) throw new Error('Network response was not ok');
        
        const data = await response.json();
        cache = data;
        renderCoins(data);
    } catch(e) {
        console.error('Error loading coins:', e);
        if (!cache) {
            const list = $('coinsList');
            if (list) {
                list.innerHTML = '<div class="loading">❌ Ошибка загрузки. Повтор...</div>';
            }
            setTimeout(loadCoins, 3000);
        }
    }
}

function renderCoins(data) {
    const list = $('coinsList');
    if (!list) return;
    
    list.innerHTML = '';
    
    coins.forEach((coin, index) => {
        const info = data[coin.id];
        const div = document.createElement('div');
        div.className = 'coin-item';
        
        let priceHtml = '<div class="coin-price">--</div>';
        let changeHtml = '<div class="coin-change-24h" style="color:rgba(255,255,255,0.3);">--</div>';
        
        if (info && info.usd !== undefined) {
            const price = info.usd;
            const change = info.usd_24h_change || 0;
            const changeClass = change >= 0 ? 'green' : 'red';
            const changeText = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
            
            priceHtml = `<div class="coin-price">$${price.toFixed(2)}</div>`;
            changeHtml = `<div class="coin-change-24h ${changeClass}">${changeText}</div>`;
        }
        
        div.innerHTML = `
            <span class="coin-number">${index + 1}</span>
            <div class="coin-icon ${coin.symbol}">${coin.icon}</div>
            <div class="coin-info">
                <div class="coin-name">${coin.name}</div>
                <div class="coin-symbol">${coin.symbol.toUpperCase()}</div>
            </div>
            ${priceHtml}
            ${changeHtml}
        `;
        
        div.onclick = function() {
            openChart(coin.id);
        };
        
        list.appendChild(div);
    });
}

// График цены
async function fetchChartData(id, days) {
    try {
        const url = `https://api.coingecko.com/api/v3/coins/${id}/market_chart?vs_currency=usd&days=${days}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error('Network response was not ok');
        const data = await response.json();
        return data.prices || [];
    } catch(e) {
        console.error('Error fetching chart data:', e);
        return [];
    }
}

function drawChart(ctx, prices) {
    const labels = prices.map(p => {
        const d = new Date(p[0]);
        if (currentDays >= 180) {
            return d.toLocaleDateString('ru-RU', { month: 'short', year: 'numeric' });
        } else {
            return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
        }
    });
    
    const values = prices.map(p => p[1]);
    window._vals = values;
    window._prices = prices;
    
    const gradient = ctx.createLinearGradient(0, 0, 0, 300);
    gradient.addColorStop(0, 'rgba(255,193,7,0.3)');
    gradient.addColorStop(1, 'rgba(255,193,7,0.0)');
    
    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                data: values,
                borderColor: '#ffc107',
                backgroundColor: gradient,
                fill: true,
                tension: 0.4,
                pointRadius: 0,
                pointHoverRadius: 6,
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: { enabled: false }
            },
            scales: {
                x: {
                    grid: { color: 'rgba(255,255,255,0.05)' },
                    ticks: { color: 'rgba(255,255,255,0.4)', maxTicksLimit: 10, maxRotation: 30 }
                },
                y: {
                    grid: { color: 'rgba(255,255,255,0.05)' },
                    ticks: { color: 'rgba(255,255,255,0.4)', callback: v => '$' + v.toFixed(0) }
                }
            }
        }
    });
    
    if (prices.length) {
        currentPrice = prices[prices.length - 1][1];
    }
}
