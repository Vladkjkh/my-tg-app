<body>

<div class="app" id="appContainer">
    <button class="top-btn" id="mainBtn">Индикаторы</button>
    <div class="content">
        <div id="mainPage">
            <div class="coins-list" id="coinsList"><div class="loading">Загрузка...</div></div>
        </div>
    </div>
</div>

<div id="indicatorsPage">
    <button class="back-btn" id="backFromIndicators">←</button>
    <div class="indicator-square">
        <div class="value" id="indicatorValue">1</div>
    </div>
    <div class="title">Индикаторы</div>
</div>

<div id="chartPage">
    <button class="back-btn" id="backFromChart">←</button>
    <div class="chart-header" id="chartCoinTitle">Bitcoin</div>
    <div class="chart-price-display" id="chartPriceDisplay">$0.00</div>
    <div class="chart-change-display" id="chartChangeDisplay">+0.00%</div>
    <div class="chart-container"><canvas id="priceChart"></canvas></div>
    <div class="timeframes">
        <button class="timeframe-btn" data-days="0.166">4ч</button>
        <button class="timeframe-btn" data-days="0.5">12ч</button>
        <button class="timeframe-btn active" data-days="1">1д</button>
        <button class="timeframe-btn" data-days="7">1н</button>
        <button class="timeframe-btn" data-days="30">1м</button>
        <button class="timeframe-btn" data-days="90">3м</button>
        <button class="timeframe-btn" data-days="180">6м</button>
        <button class="timeframe-btn" data-days="365">1г</button>
    </div>
</div>

<script>
const tg = window.Telegram.WebApp; tg.ready(); tg.expand();

document.getElementById('mainBtn').onclick = () => {
    document.getElementById('appContainer').style.display = 'none';
    document.getElementById('indicatorsPage').style.display = 'flex';
};
document.getElementById('backFromIndicators').onclick = () => {
    document.getElementById('indicatorsPage').style.display = 'none';
    document.getElementById('appContainer').style.display = 'flex';
};

let chart = null, currentCoinId = 'bitcoin', currentDays = 1, updateInterval = null, currentPrice = 0, isTouching = false;

function getCoinDisplayName(id) {
    const map = { 'bitcoin':'Bitcoin', 'ethereum':'Ethereum', 'binancecoin':'BNB', 'ripple':'XRP', 'solana':'Solana', 'tron':'TRX', 'hyperliquid':'Hype' };
    return map[id] || id;
}

async function fetchWithRetry(url, retries=3) {
    for (let i=0; i<retries; i++) {
        try { const resp = await fetch(url); if (resp.ok) return await resp.json(); }
        catch(e) { if (i===retries-1) throw e; await new Promise(r => setTimeout(r, 1000*(i+1))); }
    }
}

async function fetchChartData(id, days) {
    try {
        let d = days; if (d===365 || d===180) d = Math.min(d,365);
        const data = await fetchWithRetry(`https://api.coingecko.com/api/v3/coins/${id}/market_chart?vs_currency=usd&days=${d}`);
        return data.prices || [];
    } catch(e) { return []; }
}

function drawLineChart(ctx, prices) {
    const labels = prices.map(p => { const d = new Date(p[0]); return currentDays>=180 ? d.toLocaleDateString('ru-RU',{month:'short',year:'numeric'}) : d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'}); });
    const values = prices.map(p => p[1]);
    window._vals = values;
    const grad = ctx.createLinearGradient(0,0,0,300);
    grad.addColorStop(0,'rgba(255,193,7,0.3)'); grad.addColorStop(1,'rgba(255,193,7,0.0)');
    chart = new Chart(ctx, {
        type:'line',
        data:{ labels, datasets:[{ label:'Цена USD', data:values, borderColor:'#ffc107', backgroundColor:grad, fill:true, tension:0.4, pointRadius:0, pointHoverRadius:6, borderWidth:2 }] },
        options:{
            responsive:true, maintainAspectRatio:false,
            plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:ctx => '$'+ctx.parsed.y.toFixed(2) } } },
            scales:{
                x:{ grid:{color:'rgba(255,255,255,0.05)'}, ticks:{color:'rgba(255,255,255,0.4)', maxTicksLimit:10, maxRotation:30, autoSkip:true} },
                y:{ grid:{color:'rgba(255,255,255,0.05)'}, ticks:{color:'rgba(255,255,255,0.4)', callback:v => '$'+v.toFixed(0)} }
            },
            onHover:(e,el) => {
                if (el && el.length>0) {
                    const idx = el[0].index, price = window._vals[idx];
                    document.getElementById('chartPriceDisplay').textContent = '$'+price.toFixed(2);
                    document.getElementById('chartPriceDisplay').classList.add('touch');
                    isTouching = true;
                } else if (isTouching) {
                    document.getElementById('chartPriceDisplay').textContent = '$'+currentPrice.toFixed(2);
                    document.getElementById('chartPriceDisplay').classList.remove('touch');
                    isTouching = false;
                }
            }
        }
    });
    if (prices.length>0) currentPrice = prices[prices.length-1][1];
}

async function updateChart(coinId, days) {
    const prices = await fetchChartData(coinId, days);
    if (!prices.length) return;
    currentPrice = prices[prices.length-1][1];
    const prev = prices[0][1], chg = prev!==0 ? ((currentPrice-prev)/prev*100) : 0, cls = chg>=0 ? 'green' : 'red';
    const priceEl = document.getElementById('chartPriceDisplay');
    if (!isTouching) { priceEl.textContent = '$'+currentPrice.toFixed(2); priceEl.classList.remove('touch'); }
    const changeEl = document.getElementById('chartChangeDisplay');
    changeEl.textContent = (chg>=0?'+':'')+chg.toFixed(2)+'%';
    changeEl.className = 'chart-change-display '+cls;
    const ctx = document.getElementById('priceChart').getContext('2d');
    if (chart) chart.destroy();
    drawLineChart(ctx, prices);
}

function openChartPage(coinId) {
    currentCoinId = coinId;
    document.getElementById('appContainer').style.display = 'none';
    document.getElementById('chartPage').style.display = 'flex';
    document.getElementById('chartCoinTitle').textContent = getCoinDisplayName(coinId);
    document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.timeframe-btn[data-days="1"]').classList.add('active');
    currentDays = 1; isTouching = false;
    updateChart(coinId, currentDays);
    if (updateInterval) clearInterval(updateInterval);
    updateInterval = setInterval(() => updateChart(currentCoinId, currentDays), 60000);
}

document.getElementById('backFromChart').onclick = () => {
    if (updateInterval) { clearInterval(updateInterval); updateInterval = null; }
    document.getElementById('chartPage').style.display = 'none';
    document.getElementById('appContainer').style.display = 'flex';
};

document.querySelectorAll('.timeframe-btn').forEach(btn => btn.onclick = function() {
    document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentDays = parseFloat(this.dataset.days);
    isTouching = false;
    updateChart(currentCoinId, currentDays);
});

const coins = [
    { id:'bitcoin', name:'Bitcoin', symbol:'btc', icon:'₿' },
    { id:'ethereum', name:'Ethereum', symbol:'eth', icon:'⟠' },
    { id:'binancecoin', name:'BNB', symbol:'bnb', icon:'B' },
    { id:'ripple', name:'XRP', symbol:'xrp', icon:'✕' },
    { id:'solana', name:'Solana', symbol:'sol', icon:'◎' },
    { id:'tron', name:'TRX', symbol:'trx', icon:'T' },
    { id:'hyperliquid', name:'Hype', symbol:'hype', icon:'◆' }
];

let coinCache = null;

async function fetchCoinData() {
    try {
        if (coinCache) renderCoins(coinCache);
        const ids = coins.map(c=>c.id).join(',');
        const data = await fetchWithRetry(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`);
        coinCache = data;
        renderCoins(data);
    } catch(e) {
        if (!coinCache) {
            document.getElementById('coinsList').innerHTML = '<div class="loading">Ошибка. Повтор...</div>';
            setTimeout(fetchCoinData, 3000);
        }
    }
}

function renderCoins(data) {
    const list = document.getElementById('coinsList');
    list.innerHTML = '';
    coins.forEach((coin, idx) => {
        const info = data[coin.id];
        if (!info) {
            const item = document.createElement('div'); item.className = 'coin-item';
            item.innerHTML = `<span class="coin-number">${idx+1}</span><div class="coin-icon ${coin.symbol}">${coin.icon}</div><div class="coin-info"><div class="coin-name">${coin.name}</div><div class="coin-symbol">${coin.symbol.toUpperCase()}</div></div><div class="coin-price">--</div><div class="coin-change-24h" style="color:rgba(255,255,255,0.3);">--</div>`;
            item.onclick = () => openChartPage(coin.id);
            list.appendChild(item);
            return;
        }
        const price = info.usd, change24h = info.usd_24h_change || 0;
        const cls = change24h >= 0 ? 'green' : 'red';
        const txt = (change24h >= 0 ? '+' : '') + change24h.toFixed(2) + '%';
        const item = document.createElement('div'); item.className = 'coin-item';
        item.innerHTML = `<span class="coin-number">${idx+1}</span><div class="coin-icon ${coin.symbol}">${coin.icon}</div><div class="coin-info"><div class="coin-name">${coin.name}</div><div class="coin-symbol">${coin.symbol.toUpperCase()}</div></div><div class="coin-price">$${price.toFixed(2)}</div><div class="coin-change-24h ${cls}">${txt}</div>`;
        item.onclick = () => openChartPage(coin.id);
        list.appendChild(item);
    });
}

fetchCoinData();
setInterval(fetchCoinData, 60000);
</script>
</body>
</html>
