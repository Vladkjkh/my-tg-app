<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приложение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            font-family: Arial, sans-serif;
            flex-direction: column;
            background-image: url('https://avatars.mds.yandex.net/get-entity_search/2356618/969838143/orig');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            padding-top: 80px;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ С КНОПКАМИ */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            z-index: 2;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .top-left, .top-right {
            display: flex;
            flex-direction: column;
        }
        .top-left .label, .top-right .label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .top-left .value, .top-right .value {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            margin-top: 2px;
        }
        .top-left .value {
            color: #4caf50;
        }
        .top-right .value {
            color: #ff9800;
        }

        /* КВАДРАТНЫЕ КНОПКИ СВЕРХУ */
        .nav-buttons {
            position: absolute;
            top: 75px;
            left: 0;
            right: 0;
            display: flex;
            gap: 10px;
            padding: 10px 20px;
            z-index: 2;
            background: rgba(0, 0, 0, 0.3);
        }
        .nav-btn {
            flex: 1;
            padding: 12px 0;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #ffffff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }
        .nav-btn.active {
            background: rgba(255, 255, 255, 0.3);
            border-color: #ffffff;
        }
        .nav-btn:active {
            transform: scale(0.95);
        }

        /* КОНТЕНТ */
        .content {
            position: relative;
            z-index: 1;
            width: 100%;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* СТРАНИЦА ИНДИКАТОРОВ */
        #indicatorsPage {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }
        #indicatorsPage.active {
            display: flex;
        }
        .indicator-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .indicator-card .label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
        }
        .indicator-card .value {
            font-size: 22px;
            font-weight: bold;
            color: #ffffff;
            margin-top: 5px;
        }
        .indicator-card .value.green { color: #4caf50; }
        .indicator-card .value.orange { color: #ff9800; }

        /* СТРАНИЦА ГРАФИКОВ */
        #chartsPage {
            display: none;
            width: 100%;
            height: 100%;
        }
        #chartsPage.active {
            display: block;
        }
        #chart-container {
            width: 100%;
            height: 80vh;
        }

        .back-btn {
            background: #333333;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 16px;
            display: none;
            position: relative;
            z-index: 1;
            border: none;
            cursor: pointer;
        }
        .back-btn:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <!-- ВЕРХНЯЯ ПАНЕЛЬ С ПОКАЗАТЕЛЯМИ -->
    <div class="top-bar">
        <div class="top-left">
            <span class="label">Рыночная капитализация</span>
            <span class="value" id="marketCap">Загрузка...</span>
        </div>
        <div class="top-right">
            <span class="label">Индекс страха и жадности</span>
            <span class="value" id="fearGreed">Загрузка...</span>
        </div>
    </div>

    <!-- КНОПКИ НАВИГАЦИИ -->
    <div class="nav-buttons">
        <button class="nav-btn active" id="indicatorsBtn">Индикаторы</button>
        <button class="nav-btn" id="chartsBtn">Графики</button>
    </div>

    <!-- КОНТЕНТ -->
    <div class="content">
        <!-- Страница индикаторов -->
        <div id="indicatorsPage" class="active">
            <div class="indicator-card">
                <div class="label">Рыночная капитализация</div>
                <div class="value green" id="marketCapBig">Загрузка...</div>
            </div>
            <div class="indicator-card">
                <div class="label">Индекс страха и жадности</div>
                <div class="value orange" id="fearGreedBig">Загрузка...</div>
            </div>
            <div class="indicator-card">
                <div class="label">Цена биткоина</div>
                <div class="value" id="btcPrice" style="color:#f7931a;">Загрузка...</div>
            </div>
        </div>

        <!-- Страница графиков -->
        <div id="chartsPage">
            <div id="chart-container"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Получение капитализации
        async function getMarketCap() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/global');
                const data = await response.json();
                const cap = data.data.total_market_cap.usd;
                if (cap >= 1e12) {
                    return '$' + (cap / 1e12).toFixed(2) + ' трлн';
                } else if (cap >= 1e9) {
                    return '$' + (cap / 1e9).toFixed(2) + ' млрд';
                } else {
                    return '$' + cap.toFixed(0);
                }
            } catch (e) {
                return 'Ошибка';
            }
        }

        // Получение индекса страха и жадности
        async function getFearGreed() {
            try {
                const response = await fetch('https://api.alternative.me/fng/?limit=1');
                const data = await response.json();
                const value = data.data[0].value;
                const classification = data.data[0].value_classification;
                return value + ' - ' + classification;
            } catch (e) {
                return 'Ошибка';
            }
        }

        // Получение цены биткоина
        async function getBtcPrice() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                const data = await response.json();
                return '$' + data.bitcoin.usd.toLocaleString();
            } catch (e) {
                return 'Ошибка';
            }
        }

        // Загрузка всех данных
        async function loadData() {
            const cap = await getMarketCap();
            const fg = await getFearGreed();
            const price = await getBtcPrice();

            document.getElementById('marketCap').textContent = cap;
            document.getElementById('fearGreed').textContent = fg;
            document.getElementById('marketCapBig').textContent = cap;
            document.getElementById('fearGreedBig').textContent = fg;
            document.getElementById('btcPrice').textContent = price;
        }

        loadData();

        // Переключение между страницами
        document.getElementById('indicatorsBtn').addEventListener('click', function() {
            document.getElementById('indicatorsBtn').classList.add('active');
            document.getElementById('chartsBtn').classList.remove('active');
            document.getElementById('indicatorsPage').classList.add('active');
            document.getElementById('chartsPage').classList.remove('active');
        });

        document.getElementById('chartsBtn').addEventListener('click', function() {
            document.getElementById('chartsBtn').classList.add('active');
            document.getElementById('indicatorsBtn').classList.remove('active');
            document.getElementById('chartsPage').classList.add('active');
            document.getElementById('indicatorsPage').classList.remove('active');

            // Загружаем график, если ещё не загружен
            const container = document.getElementById('chart-container');
            if (container.innerHTML === '') {
                const script = document.createElement('script');
                script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
                script.innerHTML = JSON.stringify({
                    "width": "100%",
                    "height": "100%",
                    "symbol": "BINANCE:BTCUSDT",
                    "interval": "60",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "ru",
                    "allow_symbol_change": true,
                    "calendar": false,
                    "support_host": "https://www.tradingview.com"
                });
                container.appendChild(script);
            }
        });
    </script>

</body>
</html>
