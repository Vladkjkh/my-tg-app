<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приложение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            font-family: Arial, sans-serif;
            background-image: url('https://avatars.mds.yandex.net/get-entity_search/2356618/969838143/orig');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .top-buttons {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 2;
            gap: 6px;
        }
        .top-btn {
            flex: 1;
            aspect-ratio: 1 / 1;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .top-btn:active {
            transform: scale(0.95);
            opacity: 0.7;
        }

        .coins-list {
            position: absolute;
            top: 140px;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
            padding: 0 16px 16px 16px;
            overflow-y: auto;
        }
        .coin-item {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            margin-bottom: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .coin-number {
            color: rgba(255, 255, 255, 0.25);
            font-size: 11px;
            font-weight: bold;
            width: 20px;
        }
        .coin-icon {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            color: #fff;
            flex-shrink: 0;
        }
        .coin-icon.btc { background: #f7931a; }
        .coin-icon.eth { background: #627eea; }
        .coin-icon.xrp { background: #00aae4; }
        .coin-icon.hype { background: #8b5cf6; }

        .coin-info {
            flex: 1;
        }
        .coin-name {
            color: #ffffff;
            font-size: 13px;
            font-weight: 600;
        }
        .coin-symbol {
            color: rgba(255, 255, 255, 0.35);
            font-size: 10px;
            text-transform: uppercase;
        }
        .coin-price {
            color: #ffffff;
            font-size: 13px;
            font-weight: 600;
            text-align: right;
            margin-right: 10px;
        }
        .coin-change {
            font-size: 12px;
            font-weight: 600;
            text-align: right;
            min-width: 55px;
        }
        .coin-change.green { color: #4caf50; }
        .coin-change.red { color: #f44336; }

        .loading {
            color: rgba(255,255,255,0.6);
            text-align: center;
            padding: 30px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="top-buttons">
        <button class="top-btn" id="indicatorsBtn">Индикаторы</button>
        <button class="top-btn" id="chartsBtn">Графики</button>
    </div>

    <div class="coins-list" id="coinsList">
        <div class="loading">Загрузка данных...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        document.getElementById('indicatorsBtn').addEventListener('click', function() {
            tg.sendData('indicators');
            tg.close();
        });

        document.getElementById('chartsBtn').addEventListener('click', function() {
            tg.sendData('charts');
            tg.close();
        });

        const coins = [
            { id: 'bitcoin', name: 'Bitcoin', symbol: 'btc', icon: '₿' },
            { id: 'ethereum', name: 'Ethereum', symbol: 'eth', icon: '⟠' },
            { id: 'ripple', name: 'XRP', symbol: 'xrp', icon: '✕' },
            { id: 'hyperliquid', name: 'Hype', symbol: 'hype', icon: '◆' }
        ];

        async function fetchCoinData() {
            try {
                const ids = coins.map(c => c.id).join(',');
                const url = `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`;
                const response = await fetch(url);
                const data = await response.json();

                const list = document.getElementById('coinsList');
                list.innerHTML = '';

                coins.forEach((coin, index) => {
                    const info = data[coin.id];
                    if (!info) return;

                    const price = info.usd;
                    const change = info.usd_24h_change;

                    const item = document.createElement('div');
                    item.className = 'coin-item';

                    const changeClass = change >= 0 ? 'green' : 'red';
                    const changeText = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';

                    item.innerHTML = `
                        <span class="coin-number">${index + 1}</span>
                        <div class="coin-icon ${coin.symbol}">${coin.icon}</div>
                        <div class="coin-info">
                            <div class="coin-name">${coin.name}</div>
                            <div class="coin-symbol">${coin.symbol.toUpperCase()}</div>
                        </div>
                        <div class="coin-price">$${price.toFixed(2)}</div>
                        <div class="coin-change ${changeClass}">${changeText}</div>
                    `;

                    list.appendChild(item);
                });

            } catch (e) {
                document.getElementById('coinsList').innerHTML = '<div class="loading">Ошибка загрузки данных</div>';
            }
        }

        fetchCoinData();
        setInterval(fetchCoinData, 60000);
    </script>

</body>
</html>
