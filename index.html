<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приложение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #000;
            overflow: hidden;
        }

        body {
            background-image: url('https://avatars.mds.yandex.net/get-entity_search/2356618/969838143/orig');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ВЕРХНИЕ КНОПКИ */
        .top-buttons {
            display: flex;
            gap: 8px;
            padding: 20px 16px 0 16px;
            flex-shrink: 0;
        }

        .top-btn {
            flex: 1;
            aspect-ratio: 1 / 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: 0.2s;
        }

        .top-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        /* ОСНОВНОЙ КОНТЕНТ */
        .content {
            flex: 1;
            overflow: hidden;
            padding: 10px 16px 0 16px;
        }

        #mainPage {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .coins-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-bottom: 10px;
        }

        .coin-item {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
            cursor: pointer;
            transition: 0.2s;
        }

        .coin-item:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.1);
        }

        .coin-number {
            color: rgba(255, 255, 255, 0.25);
            font-size: 12px;
            font-weight: bold;
            width: 22px;
        }

        .coin-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            flex-shrink: 0;
        }
        .coin-icon.btc { background: #f7931a; }
        .coin-icon.eth { background: #627eea; }
        .coin-icon.xrp { background: #00aae4; }
        .coin-icon.hype { background: #8b5cf6; }

        .coin-info {
            flex: 1;
        }
        .coin-name {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
        }
        .coin-symbol {
            color: rgba(255, 255, 255, 0.35);
            font-size: 11px;
            text-transform: uppercase;
        }

        .coin-price {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            margin-right: 12px;
            white-space: nowrap;
        }

        .coin-change {
            font-size: 13px;
            font-weight: 600;
            min-width: 60px;
            text-align: right;
            white-space: nowrap;
        }
        .coin-change.green { color: #4caf50; }
        .coin-change.red { color: #f44336; }

        .loading {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 30px 0;
            font-size: 14px;
        }

        /* НИЖНИЕ КНОПКИ */
        .bottom-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px 16px 16px 16px;
            flex-shrink: 0;
            gap: 12px;
        }

        .bottom-btn {
            flex: 1;
            padding: 12px 0;
            border-radius: 12px;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }

        .bottom-btn:active {
            transform: scale(0.95);
            opacity: 0.7;
        }

        .btn-home {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-profile {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* СТРАНИЦА ПРОФИЛЯ */
        #profilePage {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e27;
            z-index: 999;
            flex-direction: column;
            padding: 20px;
        }

        #profilePage .close-profile {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            font-size: 24px;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-top: 60px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .profile-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar-box {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.15);
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .avatar-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-box .avatar-placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            text-align: center;
        }

        .avatar-input {
            display: none;
        }

        .profile-fields {
            flex: 1;
        }

        .profile-fields input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        .profile-fields input:focus {
            border-color: #f7931a;
        }

        .profile-fields .label {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
        }

        .profile-fields .field-group {
            margin-bottom: 12px;
        }

        .profile-fields .field-group:last-child {
            margin-bottom: 0;
        }

        .profile-save-btn {
            margin-top: 16px;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: #f7931a;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .profile-save-btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="app" id="appContainer">
        <!-- ВЕРХНИЕ КНОПКИ -->
        <div class="top-buttons">
            <button class="top-btn" id="indicatorsBtn">Индикаторы</button>
            <button class="top-btn" id="chartsBtn">Графики</button>
        </div>

        <!-- КОНТЕНТ -->
        <div class="content">
            <div id="mainPage">
                <div class="coins-list" id="coinsList">
                    <div class="loading">Загрузка данных...</div>
                </div>
            </div>
        </div>

        <!-- НИЖНИЕ КНОПКИ -->
        <div class="bottom-bar">
            <button class="bottom-btn btn-home" id="homeBtn">🏠</button>
            <button class="bottom-btn btn-profile" id="profileBtn">👤</button>
        </div>
    </div>

    <!-- СТРАНИЦА ПРОФИЛЯ -->
    <div id="profilePage">
        <button class="close-profile" id="closeProfile">✕</button>

        <div class="profile-card">
            <div class="profile-row">
                <div class="avatar-box" id="avatarBox">
                    <div class="avatar-placeholder" id="avatarPlaceholder">Загрузить</div>
                    <img id="avatarImage" style="display:none;">
                </div>
                <input type="file" class="avatar-input" id="avatarInput" accept="image/*">

                <div class="profile-fields">
                    <div class="field-group">
                        <span class="label">Никнейм</span>
                        <input type="text" id="nicknameInput" placeholder="Введите никнейм" value="">
                    </div>
                </div>
            </div>

            <button class="profile-save-btn" id="saveProfileBtn">Сохранить</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        document.getElementById('indicatorsBtn').addEventListener('click', function() {
            tg.sendData('indicators');
            tg.close();
        });

        document.getElementById('chartsBtn').addEventListener('click', function() {
            tg.sendData('charts');
            tg.close();
        });

        // КНОПКА НА ГЛАВНУЮ (ДОМИК)
        document.getElementById('homeBtn').addEventListener('click', function() {
            document.getElementById('mainPage').style.display = 'flex';
            document.getElementById('profilePage').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
        });

        // КНОПКА ПРОФИЛЬ (ЧЕЛОВЕЧЕК)
        document.getElementById('profileBtn').addEventListener('click', function() {
            document.getElementById('profilePage').style.display = 'flex';
            document.getElementById('appContainer').style.display = 'none';
            loadProfileData();
        });

        document.getElementById('closeProfile').addEventListener('click', function() {
            document.getElementById('profilePage').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
        });

        // ===== АВАТАРКА =====
        const avatarBox = document.getElementById('avatarBox');
        const avatarInput = document.getElementById('avatarInput');
        const avatarImage = document.getElementById('avatarImage');
        const avatarPlaceholder = document.getElementById('avatarPlaceholder');

        avatarBox.addEventListener('click', function() {
            avatarInput.click();
        });

        avatarInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    avatarImage.src = event.target.result;
                    avatarImage.style.display = 'block';
                    avatarPlaceholder.style.display = 'none';
                    localStorage.setItem('user_avatar', event.target.result);
                };
                reader.readAsDataURL(file);
            }
        });

        // ===== НИКНЕЙМ =====
        const nicknameInput = document.getElementById('nicknameInput');

        function loadProfileData() {
            const savedAvatar = localStorage.getItem('user_avatar');
            if (savedAvatar) {
                avatarImage.src = savedAvatar;
                avatarImage.style.display = 'block';
                avatarPlaceholder.style.display = 'none';
            }

            const savedNickname = localStorage.getItem('user_nickname');
            if (savedNickname) {
                nicknameInput.value = savedNickname;
            }
        }

        document.getElementById('saveProfileBtn').addEventListener('click', function() {
            const nickname = nicknameInput.value.trim();
            if (nickname) {
                localStorage.setItem('user_nickname', nickname);
                tg.showAlert('Профиль сохранён!');
            } else {
                tg.showAlert('Введите никнейм');
            }
        });

        // ===== МОНЕТЫ =====
        const coins = [
            { id: 'bitcoin', name: 'Bitcoin', symbol: 'btc', icon: '₿' },
            { id: 'ethereum', name: 'Ethereum', symbol: 'eth', icon: '⟠' },
            { id: 'ripple', name: 'XRP', symbol: 'xrp', icon: '✕' },
            { id: 'hyperliquid', name: 'Hype', symbol: 'hype', icon: '◆' }
        ];

        async function fetchCoinData() {
            try {
                const ids = coins.map(c => c.id).join(',');
                const url =
                    `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`;
                const response = await fetch(url);
                const data = await response.json();

                const list = document.getElementById('coinsList');
                list.innerHTML = '';

                coins.forEach((coin, index) => {
                    const info = data[coin.id];
                    if (!info) return;

                    const price = info.usd;
                    const change = info.usd_24h_change;
                    const changeClass = change >= 0 ? 'green' : 'red';
                    const changeText = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';

                    const item = document.createElement('div');
                    item.className = 'coin-item';
                    item.innerHTML = `
                        <span class="coin-number">${index + 1}</span>
                        <div class="coin-icon ${coin.symbol}">${coin.icon}</div>
                        <div class="coin-info">
                            <div class="coin-name">${coin.name}</div>
                            <div class="coin-symbol">${coin.symbol.toUpperCase()}</div>
                        </div>
                        <div class="coin-price">$${price.toFixed(2)}</div>
                        <div class="coin-change ${changeClass}">${changeText}</div>
                    `;
                    item.addEventListener('click', function() {
                        if (coin.id === 'bitcoin') {
                            tg.sendData('bitcoin');
                            tg.close();
                        }
                    });
                    list.appendChild(item);
                });

            } catch (e) {
                document.getElementById('coinsList').innerHTML = '<div class="loading">Ошибка загрузки данных</div>';
            }
        }

        fetchCoinData();
        setInterval(fetchCoinData, 60000);
    </script>

</body>
</html>
