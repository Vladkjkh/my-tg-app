<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приложение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { height:100%; font-family:Arial,sans-serif; background:#000; overflow:hidden; }
        body {
            background-image:url('https://avatars.mds.yandex.net/get-entity_search/2356618/969838143/orig');
            background-size:cover; background-position:center; background-repeat:no-repeat;
            display:flex; align-items:flex-start; justify-content:center; position:relative;
        }
        body::before {
            content:''; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.65); z-index:0;
        }
        .app { position:relative; z-index:1; width:100%; max-width:100%; height:100vh; display:flex; flex-direction:column; }
        .top-btn {
            display:block; width:calc(100% - 32px); margin:20px 16px 0; padding:20px 0;
            background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15); border-radius:16px;
            color:#fff; font-size:20px; font-weight:bold; cursor:pointer; backdrop-filter:blur(8px);
            text-align:center; transition:0.2s; flex-shrink:0;
        }
        .top-btn:active { transform:scale(0.98); background:rgba(255,255,255,0.2); }
        .content { flex:1; overflow:hidden; padding:10px 16px 0; }
        #mainPage { display:flex; flex-direction:column; height:100%; }
        .coins-list { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:4px; padding-bottom:10px; }
        .coin-item {
            display:flex; align-items:center; padding:10px 16px; background:rgba(255,255,255,0.05);
            backdrop-filter:blur(4px); border-radius:12px; border:1px solid rgba(255,255,255,0.06);
            cursor:pointer; gap:10px; transition:0.2s;
        }
        .coin-item:active { transform:scale(0.98); background:rgba(255,255,255,0.1); }
        .coin-number { color:rgba(255,255,255,0.25); font-size:12px; font-weight:bold; width:20px; flex-shrink:0; }
        .coin-icon { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:bold; color:#fff; flex-shrink:0; }
        .coin-icon.btc { background:#f7931a; }
        .coin-icon.eth { background:#627eea; }
        .coin-icon.bnb { background:#f0b90b; }
        .coin-icon.xrp { background:#00aae4; }
        .coin-icon.sol { background:#9945ff; }
        .coin-icon.trx { background:#ef0027; }
        .coin-icon.hype { background:#8b5cf6; }
        .coin-info { flex:1; min-width:0; }
        .coin-name { color:#fff; font-size:15px; font-weight:600; }
        .coin-symbol { color:rgba(255,255,255,0.35); font-size:10px; text-transform:uppercase; }
        .coin-price { color:#fff; font-size:15px; font-weight:600; white-space:nowrap; min-width:70px; text-align:right; }
        .coin-change-24h { font-size:13px; font-weight:600; min-width:55px; text-align:right; }
        .coin-change-24h.green { color:#4caf50; }
        .coin-change-24h.red { color:#f44336; }
        .loading { color:rgba(255,255,255,0.5); text-align:center; padding:30px 0; font-size:14px; }

        /* Страница индикаторов */
        #indicatorsPage {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:#0a0e27; z-index:999; padding:20px; 
            flex-direction:column; align-items:center; overflow-y:auto;
        }
        #indicatorsPage .back-btn {
            position:absolute; top:16px; left:16px; z-index:10;
            background:rgba(255,255,255,0.1); border:none; color:#fff; font-size:20px;
            padding:6px 14px; border-radius:20px; cursor:pointer;
        }
        #indicatorsPage .back-btn:active { transform:scale(0.95); opacity:0.7; }

        .chart-container {
            width:100%; max-width:700px; margin:60px auto 20px;
            background:rgba(255,255,255,0.05); border-radius:16px; padding:20px;
            backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.1);
        }
        .chart-container h2 { color:#fff; font-size:16px; text-align:center; margin-bottom:15px; opacity:0.8; }
        .chart-container canvas { width:100% !important; height:auto !important; max-height:400px; }
        .chart-legend { display:flex; justify-content:center; gap:30px; margin-top:12px; }
        .chart-legend span { color:#fff; font-size:13px; display:flex; align-items:center; gap:8px; }
        .chart-legend .dot { width:14px; height:14px; border-radius:4px; display:inline-block; }
        .dot.orange { background:#FF8C00; }
        .dot.blue { background:#1E90FF; }

        /* Страница графика монеты */
        #coinChartPage {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:#0a0e27; z-index:1000; padding:20px;
            flex-direction:column; align-items:center; overflow-y:auto;
        }
        #coinChartPage .back-btn {
            position:absolute; top:16px; left:16px; z-index:10;
            background:rgba(255,255,255,0.1); border:none; color:#fff; font-size:20px;
            padding:6px 14px; border-radius:20px; cursor:pointer;
        }
        #coinChartPage .back-btn:active { transform:scale(0.95); opacity:0.7; }
        #coinChartPage .coin-title {
            color:#fff; font-size:22px; font-weight:bold; margin:50px 0 10px; text-align:center;
        }
        #coinChartPage .coin-price-large {
            color:rgba(255,255,255,0.7); font-size:16px; margin-bottom:20px;
        }
        #coinChartPage .chart-container {
            margin-top:0;
        }
    </style>
</head>
<body>
    <div class="app">
        <button class="top-btn" id="indicatorsBtn">📊 Индикаторы</button>
        <div class="content">
            <div id="mainPage">
                <div class="coins-list" id="coinsList">
                    <div class="loading">Загрузка...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Страница индикаторов -->
    <div id="indicatorsPage">
        <button class="back-btn" id="backIndicatorsBtn">← Назад</button>
        <div class="chart-container">
            <h2>Притоки и оттоки ETF (млн $)</h2>
            <canvas id="etfChart"></canvas>
            <div class="chart-legend">
                <span><span class="dot orange"></span> Bitcoin ETF</span>
                <span><span class="dot blue"></span> Ethereum ETF</span>
            </div>
        </div>
    </div>

    <!-- Страница графика монеты -->
    <div id="coinChartPage">
        <button class="back-btn" id="backCoinChartBtn">← Назад</button>
        <div class="coin-title" id="coinChartTitle">Bitcoin</div>
        <div class="coin-price-large" id="coinChartPrice">$97,854</div>
        <div class="chart-container">
            <canvas id="coinChart"></canvas>
        </div>
    </div>

    <script>
        // Данные для графика ETF
        const dates = ['1 июня', '5 июня', '10 июня', '15 июня', '18 июня', '24 июня'];
        const bitcoinData = [-150, -80, 50, -200, -444.5, -120];
        const ethereumData = [-5, 20, 10, -8, -12.8, 15];

        // Инициализация графика ETF
        const ctx = document.getElementById('etfChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: dates,
                datasets: [
                    {
                        label: 'Bitcoin ETF',
                        data: bitcoinData,
                        backgroundColor: 'rgba(255, 140, 0, 0.8)',
                        borderColor: '#FF8C00',
                        borderWidth: 2,
                        borderRadius: 4,
                    },
                    {
                        label: 'Ethereum ETF',
                        data: ethereumData,
                        backgroundColor: 'rgba(30, 144, 255, 0.8)',
                        borderColor: '#1E90FF',
                        borderWidth: 2,
                        borderRadius: 4,
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.dataset.label + ': ' + context.raw + 'M $';
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: 'rgba(255,255,255,0.6)', font: { size: 11 } }
                    },
                    y: {
                        grid: { color: 'rgba(255,255,255,0.1)' },
                        ticks: { 
                            color: 'rgba(255,255,255,0.6)', 
                            font: { size: 11 },
                            callback: function(value) { return value + 'M'; }
                        }
                    }
                }
            },
            plugins: [{
                id: 'zeroLine',
                afterDraw: function(chart) {
                    const yScale = chart.scales.y;
                    const yZero = yScale.getPixelForValue(0);
                    const ctx = chart.ctx;
                    ctx.save();
                    ctx.beginPath();
                    ctx.moveTo(chart.chartArea.left, yZero);
                    ctx.lineTo(chart.chartArea.right, yZero);
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.restore();
                }
            }]
        });

        // Данные для графика монеты (заглушка)
        const coinChartCtx = document.getElementById('coinChart').getContext('2d');
        let coinChart = new Chart(coinChartCtx, {
            type: 'line',
            data: {
                labels: ['1ч', '2ч', '3ч', '4ч', '5ч', '6ч', '7ч', '8ч', '9ч', '10ч', '11ч', '12ч'],
                datasets: [{
                    label: 'Цена',
                    data: [100, 102, 98, 105, 110, 108, 112, 115, 113, 118, 120, 122],
                    borderColor: '#f7931a',
                    backgroundColor: 'rgba(247, 147, 26, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: 'rgba(255,255,255,0.5)', font: { size: 10 } }
                    },
                    y: {
                        grid: { color: 'rgba(255,255,255,0.08)' },
                        ticks: { color: 'rgba(255,255,255,0.5)', font: { size: 10 } }
                    }
                }
            }
        });

        // Монеты
        const coins = [
            { name: 'Bitcoin', symbol: 'BTC', price: '$97,854', change: '+2.34%', icon: 'btc', color: '#f7931a' },
            { name: 'Ethereum', symbol: 'ETH', price: '$3,821', change: '-1.12%', icon: 'eth', color: '#627eea' },
            { name: 'BNB', symbol: 'BNB', price: '$612', change: '+0.87%', icon: 'bnb', color: '#f0b90b' },
            { name: 'XRP', symbol: 'XRP', price: '$2.41', change: '-0.45%', icon: 'xrp', color: '#00aae4' },
            { name: 'Solana', symbol: 'SOL', price: '$189.4', change: '+5.21%', icon: 'sol', color: '#9945ff' },
            { name: 'TRON', symbol: 'TRX', price: '$0.24', change: '-2.10%', icon: 'trx', color: '#ef0027' },
            { name: 'Hype', symbol: 'HYPE', price: '$12.80', change: '+12.3%', icon: 'hype', color: '#8b5cf6' },
        ];

        // Рендер списка монет
        const coinsList = document.getElementById('coinsList');
        function renderCoins() {
            coinsList.innerHTML = coins.map((c, i) => {
                const isGreen = c.change.startsWith('+');
                return `
                    <div class="coin-item" data-index="${i}">
                        <span class="coin-number">${i+1}</span>
                        <div class="coin-icon ${c.icon}">${c.symbol.slice(0,2)}</div>
                        <div class="coin-info">
                            <div class="coin-name">${c.name}</div>
                            <div class="coin-symbol">${c.symbol}</div>
                        </div>
                        <div class="coin-price">${c.price}</div>
                        <div class="coin-change-24h ${isGreen ? 'green' : 'red'}">${c.change}</div>
                    </div>
                `;
            }).join('');

            // Вешаем клики
            document.querySelectorAll('.coin-item').forEach(el => {
                el.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.index);
                    openCoinChart(idx);
                });
            });
        }
        renderCoins();

        // Открыть график монеты
        function openCoinChart(index) {
            const coin = coins[index];
            document.getElementById('coinChartTitle').textContent = coin.name;
            document.getElementById('coinChartPrice').textContent = coin.price;

            // Меняем цвет линии
            coinChart.data.datasets[0].borderColor = coin.color;
            coinChart.data.datasets[0].backgroundColor = coin.color + '33'; // с прозрачностью
            // Генерируем случайные данные
            const newData = Array.from({length: 12}, () => Math.random() * 50 + 50);
            coinChart.data.datasets[0].data = newData;
            coinChart.update();

            document.getElementById('coinChartPage').style.display = 'flex';
        }

        // Навигация
        document.getElementById('indicatorsBtn').addEventListener('click', () => {
            document.getElementById('indicatorsPage').style.display = 'flex';
        });
        document.getElementById('backIndicatorsBtn').addEventListener('click', () => {
            document.getElementById('indicatorsPage').style.display = 'none';
        });
        document.getElementById('backCoinChartBtn').addEventListener('click', () => {
            document.getElementById('coinChartPage').style.display = 'none';
        });
    </script>
</body>
</html>
