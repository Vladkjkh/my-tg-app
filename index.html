<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приложение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            flex-direction: column;
            background-image: url('https://avatars.mds.yandex.net/i?id=a20422f8f0d2a0713b6bb52f795e648840fd6905-5715888-images-thumbs&n=13');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
         body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 200px;
            position: relative;
            z-index: 1;
        }
        button {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
        }
        button:active {
            opacity: 0.7;
            transform: scale(0.95);
        }
        .btn-1 {
            background: #ffffff;
            color: #000000;
        }
        .btn-2 {
            background: #ffffff;
            color: #000000;
        }
        #chart-container {
            display: none;
            width: 100%;
            height: 80vh;
            margin-top: 20px;
            position: relative;
            z-index: 1;
        }
        .back-btn {
            background: #333333;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 16px;
            display: none;
            position: relative;
            z-index: 1;
            border: none;
            cursor: pointer;
        }
        .back-btn:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div id="menu" class="container">
        <button class="btn-1" id="btn1">1</button>
        <button class="btn-2" id="btn2">2</button>
    </div>

    <div id="chart-container"></div>
    <button class="back-btn" id="backBtn">Назад</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        document.getElementById('btn1').addEventListener('click', function() {
            tg.sendData('1');
            tg.close();
        });

        document.getElementById('btn2').addEventListener('click', function() {
            document.getElementById('menu').style.display = 'none';
            const container = document.getElementById('chart-container');
            container.style.display = 'block';
            document.getElementById('backBtn').style.display = 'block';

            container.innerHTML = '';
            const script = document.createElement('script');
            script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
            script.innerHTML = JSON.stringify({
                "width": "100%",
                "height": "100%",
                "symbol": "BINANCE:BTCUSDT",
                "interval": "60",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "ru",
                "allow_symbol_change": true,
                "calendar": false,
                "support_host": "https://www.tradingview.com"
            });
            container.appendChild(script);
        });

        document.getElementById('backBtn').addEventListener('click', function() {
            document.getElementById('chart-container').style.display = 'none';
            document.getElementById('chart-container').innerHTML = '';
            document.getElementById('menu').style.display = 'flex';
            document.getElementById('backBtn').style.display = 'none';
        });
    </script>

</body>
</html>
