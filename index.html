<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приложение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { height:100%; font-family:Arial,sans-serif; background:#000; overflow:hidden; }
        body {
            background-image:url('https://avatars.mds.yandex.net/get-entity_search/2356618/969838143/orig');
            background-size:cover; background-position:center; background-repeat:no-repeat;
            display:flex; align-items:flex-start; justify-content:center; position:relative;
        }
        body::before {
            content:''; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.65); z-index:0;
        }
        .app { position:relative; z-index:1; width:100%; max-width:420px; height:100vh; display:flex; flex-direction:column; }
        .top-btn {
            display:block; width:calc(100% - 32px); margin:20px 16px 0; padding:20px 0;
            background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15); border-radius:16px;
            color:#fff; font-size:20px; font-weight:bold; cursor:pointer; backdrop-filter:blur(8px);
            text-align:center; transition:0.2s; flex-shrink:0;
        }
        .top-btn:active { transform:scale(0.98); background:rgba(255,255,255,0.2); }
        .content { flex:1; overflow:hidden; padding:10px 16px 0; }
        #mainPage { display:flex; flex-direction:column; height:100%; }
        .coins-list { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:4px; padding-bottom:10px; }
        .coin-item {
            display:flex; align-items:center; padding:8px 10px; background:rgba(255,255,255,0.05);
            backdrop-filter:blur(4px); border-radius:12px; border:1px solid rgba(255,255,255,0.06);
            cursor:pointer; gap:6px; transition:0.2s;
        }
        .coin-item:active { transform:scale(0.98); background:rgba(255,255,255,0.1); }
        .coin-number { color:rgba(255,255,255,0.25); font-size:10px; font-weight:bold; width:16px; flex-shrink:0; }
        .coin-icon { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:bold; color:#fff; flex-shrink:0; }
        .coin-icon.btc { background:#f7931a; }
        .coin-icon.eth { background:#627eea; }
        .coin-icon.bnb { background:#f0b90b; }
        .coin-icon.xrp { background:#00aae4; }
        .coin-icon.sol { background:#9945ff; }
        .coin-icon.trx { background:#ef0027; }
        .coin-icon.hype { background:#8b5cf6; }
        .coin-info { flex:1; min-width:0; }
        .coin-name { color:#fff; font-size:13px; font-weight:600; }
        .coin-symbol { color:rgba(255,255,255,0.35); font-size:9px; text-transform:uppercase; }
        .coin-price { color:#fff; font-size:12px; font-weight:600; white-space:nowrap; min-width:55px; text-align:right; }
        .coin-change-24h { font-size:11px; font-weight:600; min-width:45px; text-align:right; }
        .coin-change-24h.green { color:#4caf50; }
        .coin-change-24h.red { color:#f44336; }
        .loading { color:rgba(255,255,255,0.5); text-align:center; padding:30px 0; font-size:14px; }

        #indicatorsPage {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:#0a0e27; z-index:999; padding:20px; overflow-y:auto;
        }
        #indicatorsPage .back-btn {
            position:absolute; top:16px; left:16px; z-index:10;
            background:rgba(255,255,255,0.1); border:none; color:#fff; font-size:20px;
            padding:6px 14px; border-radius:20px; cursor:pointer;
        }
        #indicatorsPage .back-btn:active { transform:scale(0.95); opacity:0.7; }

        .fear-greed-box {
            width:100%; margin:50px auto 0; padding:16px 16px 20px;
            background:rgba(255,255,255,0.05); border-radius:16px;
            border:1px solid rgba(255,255,255,0.08);
            backdrop-filter:blur(10px); text-align:center;
        }
        .fear-greed-box .label { color:rgba(255,255,255,0.4); font-size:10px; text-transform:uppercase; letter-spacing:0.5px; }
        .fear-greed-box .value { color:#fff; font-size:48px; font-weight:bold; margin:4px 0; }
        .fear-greed-box .status { font-size:16px; font-weight:600; padding:3px 14px; border-radius:20px; display:inline-block; }
        .fear-greed-box .status.green { color:#4caf50; background:rgba(76,175,80,0.15); }
        .fear-greed-box .status.yellow { color:#ffc107; background:rgba(255,193,7,0.15); }
        .fear-greed-box .status.red { color:#f44336; background:rgba(244,67,54,0.15); }
        .fear-greed-box .chart-wrap { height:180px; margin-top:10px; position:relative; }
        .fear-greed-box .chart-wrap canvas { width:100% !important; height:100% !important; }
        .fear-greed-box .fg-timeframes { display:flex; gap:4px; justify-content:center; margin-top:8px; flex-wrap:wrap; }
        .fear-greed-box .fg-timeframes button {
            background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); border-radius:12px;
            color:rgba(255,255,255,0.4); font-size:9px; font-weight:600; padding:3px 10px; cursor:pointer; transition:0.2s;
        }
        .fear-greed-box .fg-timeframes button.active { background:rgba(255,255,255,0.12); color:#fff; border-color:rgba(255,255,255,0.2); }
        .fear-greed-box .fg-timeframes button:active { transform:scale(0.95); }
        .fear-greed-box .sub { color:rgba(255,255,255,0.2); font-size:9px; margin-top:6px; letter-spacing:0.3px; }

        #chartPage {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:#0a0e27; z-index:999; flex-direction:column; padding:12px;
        }
        #chartPage .back-btn {
            position:absolute; top:16px; left:16px; z-index:10;
            background:rgba(255,255,255,0.1); border:none; color:#fff; font-size:20px;
            padding:6px 14px; border-radius:20px; cursor:pointer;
        }
        #chartPage .back-btn:active { transform:scale(0.95); opacity:0.7; }
        #chartPage .chart-header { color:#fff; font-size:20px; font-weight:bold; text-align:center; margin-top:50px; margin-bottom:4px; }
        #chartPage .chart-price-display { color:#fff; font-size:28px; font-weight:bold; text-align:center; transition:0.15s; }
        #chartPage .chart-price-display.touch { color:#ffc107; }
        #chartPage .chart-change-display { text-align:center; font-size:16px; font-weight:600; margin-bottom:8px; }
        #chartPage .chart-change-display.green { color:#4caf50; }
        #chartPage .chart-change-display.red { color:#f44336; }
        #chartPage .chart-container-main { flex:1; width:100%; min-height:0; position:relative; touch-action:none; }
        #chartPage .chart-container-main canvas { width:100% !important; height:100% !important; touch-action:none; }
        #chartPage .timeframes { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; padding:8px 0 12px; flex-shrink:0; }
        #chartPage .timeframe-btn {
            background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.1); border-radius:8px;
            color:rgba(255,255,255,0.6); font-size:11px; font-weight:600; padding:5px 12px; cursor:pointer; transition:0.2s;
        }
        #chartPage .timeframe-btn.active { background:rgba(255,255,255,0.15); color:#fff; border-color:rgba(255,255,255,0.3); }
        #chartPage .timeframe-btn:active { transform:scale(0.95); }

        .crosshair-line-h { pointer-events:none; position:absolute; border-top:1px dashed rgba(255,255,255,0.4); z-index:5; }
        .crosshair-line-v { pointer-events:none; position:absolute; border-left:1px dashed rgba(255,255,255,0.4); z-index:5; }
        .crosshair-label { pointer-events:none; position:absolute; color:#ffc107; font-size:12px; font-weight:bold; background:rgba(0,0,0,0.7); padding:2px 6px; border-radius:4px; z-index:6; }
    </style>
</head>
<body>

<div class="app" id="appContainer">
    <button class="top-btn" id="mainBtn">Индикаторы</button>
    <div class="content">
        <div id="mainPage">
            <div class="coins-list" id="coinsList"><div class="loading">Загрузка...</div></div>
        </div>
    </div>
</div>

<div id="indicatorsPage">
    <button class="back-btn" id="backFromIndicators">←</button>
    <div class="fear-greed-box">
        <div class="label">Индекс страха и жадности</div>
        <div class="value" id="fgValue">--</div>
        <div class="status" id="fgStatus">Загрузка...</div>
        <div class="chart-wrap"><canvas id="fgChart"></canvas></div>
        <div class="fg-timeframes">
            <button class="active" data-fg-days="30">1м</button>
            <button data-fg-days="90">3м</button>
            <button data-fg-days="180">6м</button>
            <button data-fg-days="365">1г</button>
            <button data-fg-days="max">Всё время</button>
        </div>
        <div class="sub">Данные: alternative.me</div>
    </div>
</div>

<div id="chartPage">
    <button class="back-btn" id="backFromChart">←</button>
    <div class="chart-header" id="chartCoinTitle">Bitcoin</div>
    <div class="chart-price-display" id="chartPriceDisplay">$0.00</div>
    <div class="chart-change-display" id="chartChangeDisplay">+0.00%</div>
    <div class="chart-container-main" id="chartContainer">
        <canvas id="priceChart"></canvas>
        <div class="crosshair-line-h" id="crosshairH"></div>
        <div class="crosshair-line-v" id="crosshairV"></div>
        <div class="crosshair-label" id="crosshairLabel">$0.00</div>
    </div>
    <div class="timeframes">
        <button class="timeframe-btn" data-days="0.166">4ч</button>
        <button class="timeframe-btn" data-days="0.5">12ч</button>
        <button class="timeframe-btn active" data-days="1">1д</button>
        <button class="timeframe-btn" data-days="7">1н</button>
        <button class="timeframe-btn" data-days="30">1м</button>
        <button class="timeframe-btn" data-days="90">3м</button>
        <button class="timeframe-btn" data-days="180">6м</button>
        <button class="timeframe-btn" data-days="365">1г</button>
    </div>
</div>

<script>
const tg = window.Telegram.WebApp; tg.ready(); tg.expand();

const $ = id => document.getElementById(id);

$('mainBtn').onclick = () => { $('appContainer').style.display = 'none'; $('indicatorsPage').style.display = 'flex'; loadFearGreed(30); };
$('backFromIndicators').onclick = () => { $('indicatorsPage').style.display = 'none'; $('appContainer').style.display = 'flex'; };

let chart = null, currentCoinId = 'bitcoin', currentDays = 1, updateInterval = null, currentPrice = 0, isTouching = false;
let fgChart = null;
let fgDays = 30;

const coinMap = { 'bitcoin':'Bitcoin', 'ethereum':'Ethereum', 'binancecoin':'BNB', 'ripple':'XRP', 'solana':'Solana', 'tron':'TRX', 'hyperliquid':'Hype' };

async function fetchWithRetry(url, retries=3) {
    for (let i=0; i<retries; i++) {
        try { const r = await fetch(url); if (r.ok) return await r.json(); }
        catch(e) { if (i===retries-1) throw e; await new Promise(r => setTimeout(r, 1000*(i+1))); }
    }
}

// Кнопки таймфреймов для графика страха и жадности
document.querySelectorAll('.fg-timeframes button').forEach(btn => {
    btn.onclick = function() {
        document.querySelectorAll('.fg-timeframes button').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        const days = this.dataset.fgDays;
        fgDays = days === 'max' ? 365 : parseInt(days);
        loadFearGreed(fgDays);
    };
});

async function loadFearGreed(limit) {
    try {
        const data = await fetchWithRetry(`https://api.alternative.me/fng/?limit=${limit}`);
        const items = data.data || [];
        if (items.length === 0) throw new Error('Нет данных');

        const val = parseInt(items[0].value);
        const cls = items[0].value_classification;
        $('fgValue').textContent = val;
        $('fgStatus').textContent = cls;
        const st = $('fgStatus');
        st.className = 'status';
        if (val <= 25) st.classList.add('red');
        else if (val <= 50) st.classList.add('yellow');
        else st.classList.add('green');

        // График
        const labels = items.map(item => {
            const d = new Date(item.timestamp * 1000);
            return d.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit' });
        }).reverse();
        const values = items.map(item => parseInt(item.value)).reverse();

        const ctx = $('fgChart').getContext('2d');
        if (fgChart) fgChart.destroy();

        const grad = ctx.createLinearGradient(0, 0, 0, 180);
        grad.addColorStop(0, 'rgba(255,193,7,0.3)');
        grad.addColorStop(1, 'rgba(255,193,7,0.0)');

        fgChart = new Chart(ctx, {
            type:'line',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    borderColor: '#ffc107',
                    backgroundColor: grad,
                    fill: true,
                    tension: 0.3,
                    pointRadius: 0,
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: {
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: 'rgba(255,255,255,0.3)', maxTicksLimit: 10, font: { size: 9 } }
                    },
                    y: {
                        min: 0,
                        max: 100,
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: 'rgba(255,255,255,0.3)', font: { size: 9 }, stepSize: 50 }
                    }
                }
            }
        });

    } catch(e) {
        $('fgValue').textContent = '--';
        $('fgStatus').textContent = 'Ошибка';
    }
}

async function fetchData(id, days) {
    try {
        let d = days; if (d===365 || d===180) d = Math.min(d,365);
        const data = await fetchWithRetry(`https://api.coingecko.com/api/v3/coins/${id}/market_chart?vs_currency=usd&days=${d}`);
        return data.prices || [];
    } catch(e) { return []; }
}

function drawChart(ctx, prices) {
    const labels = prices.map(p => { const d = new Date(p[0]); return currentDays>=180 ? d.toLocaleDateString('ru-RU',{month:'short',year:'numeric'}) : d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'}); });
    const values = prices.map(p => p[1]);
    window._vals = values; window._prices = prices;
    const grad = ctx.createLinearGradient(0,0,0,300);
    grad.addColorStop(0,'rgba(255,193,7,0.3)'); grad.addColorStop(1,'rgba(255,193,7,0.0)');
    chart = new Chart(ctx, {
        type:'line',
        data:{ labels, datasets:[{ data:values, borderColor:'#ffc107', backgroundColor:grad, fill:true, tension:0.4, pointRadius:0, pointHoverRadius:6, borderWidth:2 }] },
        options:{
            responsive:true, maintainAspectRatio:false,
            plugins:{ legend:{display:false}, tooltip:{ enabled:false } },
            scales:{
                x:{ grid:{color:'rgba(255,255,255,0.05)'}, ticks:{color:'rgba(255,255,255,0.4)', maxTicksLimit:10, maxRotation:30, autoSkip:true} },
                y:{ grid:{color:'rgba(255,255,255,0.05)'}, ticks:{color:'rgba(255,255,255,0.4)', callback:v => '$'+v.toFixed(0)} }
            }
        }
    });
    if (prices.length) currentPrice = prices[prices.length-1][1];
}

function updateCrosshair(x, y) {
    const canvas = $('priceChart'), canvasRect = canvas.getBoundingClientRect();
    if (!chart) return;
    const xScale = chart.scales.x, yScale = chart.scales.y;
    const canvasX = x - canvasRect.left, canvasY = y - canvasRect.top;
    let idx = 0, dist = Infinity;
    for (let i=0; i<window._vals.length; i++) {
        const d = Math.abs(xScale.getPixelForValue(i) - canvasX);
        if (d < dist) { dist = d; idx = i; }
    }
    const xPos = xScale.getPixelForValue(idx), yPos = yScale.getPixelForValue(window._vals[idx]);
    const area = chart.chartArea;
    if (xPos < area.left || xPos > area.right || yPos < area.top || yPos > area.bottom) { hideCrosshair(); return; }
    const price = window._vals[idx];
    $('crosshairH').style.cssText = `display:block;left:0;width:100%;top:${yPos}px;`;
    $('crosshairV').style.cssText = `display:block;top:0;height:100%;left:${xPos}px;`;
    $('crosshairLabel').style.cssText = `display:block;left:${xPos+10}px;top:${yPos-10}px;`;
    $('crosshairLabel').textContent = '$'+price.toFixed(2);
    $('chartPriceDisplay').textContent = '$'+price.toFixed(2);
    $('chartPriceDisplay').classList.add('touch');
    isTouching = true;
}

function hideCrosshair() {
    ['crosshairH','crosshairV','crosshairLabel'].forEach(id => $(id).style.display = 'none');
    if (isTouching) {
        $('chartPriceDisplay').textContent = '$'+currentPrice.toFixed(2);
        $('chartPriceDisplay').classList.remove('touch');
        isTouching = false;
    }
}

async function updateChart(id, days) {
    const prices = await fetchData(id, days);
    if (!prices.length) return;
    currentPrice = prices[prices.length-1][1];
    const prev = prices[0][1], chg = prev ? ((currentPrice-prev)/prev*100) : 0;
    const cls = chg>=0 ? 'green' : 'red';
    if (!isTouching) { $('chartPriceDisplay').textContent = '$'+currentPrice.toFixed(2); $('chartPriceDisplay').classList.remove('touch'); }
    $('chartChangeDisplay').textContent = (chg>=0?'+':'')+chg.toFixed(2)+'%';
    $('chartChangeDisplay').className = 'chart-change-display '+cls;
    const ctx = $('priceChart').getContext('2d');
    if (chart) chart.destroy();
    drawChart(ctx, prices);
    hideCrosshair();
}

function openChart(id) {
    currentCoinId = id;
    $('appContainer').style.display = 'none';
    $('chartPage').style.display = 'flex';
    $('chartCoinTitle').textContent = coinMap[id] || id;
    document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.timeframe-btn[data-days="1"]').classList.add('active');
    currentDays = 1; isTouching = false;
    updateChart(id, currentDays);
    if (updateInterval) clearInterval(updateInterval);
    updateInterval = setInterval(() => updateChart(currentCoinId, currentDays), 60000);
}

$('backFromChart').onclick = () => {
    if (updateInterval) { clearInterval(updateInterval); updateInterval = null; }
    $('chartPage').style.display = 'none';
    $('appContainer').style.display = 'flex';
};

document.querySelectorAll('.timeframe-btn').forEach(btn => btn.onclick = function() {
    document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentDays = parseFloat(this.dataset.days);
    isTouching = false;
    updateChart(currentCoinId, currentDays);
});

['mousemove','touchmove'].forEach(ev => {
    $('priceChart').addEventListener(ev, function(e) {
        e.preventDefault();
        const c = ev === 'touchmove' ? e.touches[0] : e;
        updateCrosshair(c.clientX, c.clientY);
    }, { passive: false });
});
$('priceChart').addEventListener('mouseleave', hideCrosshair);
$('priceChart').addEventListener('touchend', hideCrosshair);
$('priceChart').addEventListener('touchstart', function(e) {
    e.preventDefault();
    const t = e.touches[0];
    updateCrosshair(t.clientX, t.clientY);
}, { passive: false });

const coins = [
    { id:'bitcoin', name:'Bitcoin', symbol:'btc', icon:'₿' },
    { id:'ethereum', name:'Ethereum', symbol:'eth', icon:'⟠' },
    { id:'binancecoin', name:'BNB', symbol:'bnb', icon:'B' },
    { id:'ripple', name:'XRP', symbol:'xrp', icon:'✕' },
    { id:'solana', name:'Solana', symbol:'sol', icon:'◎' },
    { id:'tron', name:'TRX', symbol:'trx', icon:'T' },
    { id:'hyperliquid', name:'Hype', symbol:'hype', icon:'◆' }
];

let cache = null;

async function loadCoins() {
    try {
        if (cache) render(cache);
        const ids = coins.map(c=>c.id).join(',');
        const data = await fetchWithRetry(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`);
        cache = data; render(data);
    } catch(e) {
        if (!cache) {
            $('coinsList').innerHTML = '<div class="loading">Ошибка. Повтор...</div>';
            setTimeout(loadCoins, 3000);
        }
    }
}

function render(data) {
    const list = $('coinsList');
    list.innerHTML = '';
    coins.forEach((c, i) => {
        const info = data[c.id];
        const item = document.createElement('div');
        item.className = 'coin-item';
        if (!info) {
            item.innerHTML = `<span class="coin-number">${i+1}</span><div class="coin-icon ${c.symbol}">${c.icon}</div><div class="coin-info"><div class="coin-name">${c.name}</div><div class="coin-symbol">${c.symbol.toUpperCase()}</div></div><div class="coin-price">--</div><div class="coin-change-24h" style="color:rgba(255,255,255,0.3);">--</div>`;
        } else {
            const price = info.usd, chg = info.usd_24h_change || 0;
            const cls = chg>=0 ? 'green' : 'red';
            const txt = (chg>=0?'+':'')+chg.toFixed(2)+'%';
            item.innerHTML = `<span class="coin-number">${i+1}</span><div class="coin-icon ${c.symbol}">${c.icon}</div><div class="coin-info"><div class="coin-name">${c.name}</div><div class="coin-symbol">${c.symbol.toUpperCase()}</div></div><div class="coin-price">$${price.toFixed(2)}</div><div class="coin-change-24h ${cls}">${txt}</div>`;
        }
        item.onclick = () => openChart(c.id);
        list.appendChild(item);
    });
}

loadCoins();
setInterval(loadCoins, 60000);
</script>
</body>
</html>
