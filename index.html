<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приложение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #000;
            overflow: hidden;
        }

        body {
            background-image: url('https://avatars.mds.yandex.net/get-entity_search/2356618/969838143/orig');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            height: 100vh;
            padding: 20px 16px 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .top-buttons {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .top-btn {
            flex: 1;
            aspect-ratio: 1 / 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: 0.2s;
        }

        .top-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        #mainPage {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .coins-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-top: 10px;
            padding-bottom: 10px;
        }

        .coin-item {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
            cursor: pointer;
            transition: 0.2s;
        }

        .coin-item:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.1);
        }

        .coin-number {
            color: rgba(255, 255, 255, 0.25);
            font-size: 12px;
            font-weight: bold;
            width: 22px;
        }

        .coin-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            flex-shrink: 0;
        }
        .coin-icon.btc { background: #f7931a; }
        .coin-icon.eth { background: #627eea; }
        .coin-icon.xrp { background: #00aae4; }
        .coin-icon.hype { background: #8b5cf6; }

        .coin-info {
            flex: 1;
        }
        .coin-name {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
        }
        .coin-symbol {
            color: rgba(255, 255, 255, 0.35);
            font-size: 11px;
            text-transform: uppercase;
        }

        .coin-price {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            margin-right: 12px;
            white-space: nowrap;
        }

        .coin-change {
            font-size: 13px;
            font-weight: 600;
            min-width: 60px;
            text-align: right;
            white-space: nowrap;
        }
        .coin-change.green { color: #4caf50; }
        .coin-change.red { color: #f44336; }

        .loading {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 30px 0;
            font-size: 14px;
        }

        /* СТРАНИЦА АВТОРИЗАЦИИ */
        #authPage {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e27;
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        #authPage h2 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 30px;
        }

        #authPage input {
            width: 100%;
            max-width: 280px;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 16px;
            outline: none;
            text-align: center;
        }

        #authPage input:focus {
            border-color: #f7931a;
        }

        #authPage .auth-btn {
            margin-top: 16px;
            width: 100%;
            max-width: 280px;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: #f7931a;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        #authPage .auth-btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        #authPage .error-msg {
            color: #f44336;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }

        /* СТРАНИЦА БИТКОИНА */
        #btcPage {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e27;
            z-index: 999;
            flex-direction: column;
            padding: 12px;
        }

        #btcPage .back-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            font-size: 20px;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }

        #btcPage .back-btn:active {
            transform: scale(0.95);
            opacity: 0.7;
        }

        #btcPage .chart-container {
            flex: 1;
            width: 100%;
            min-height: 0;
            border-radius: 12px;
            overflow: hidden;
            background: #0a0e27;
            margin-top: 50px;
        }

        #btcPage .chart-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #0a0e27;
        }

        #btcPage .chart-price {
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-top: 50px;
        }
        #btcPage .chart-change {
            text-align: center;
            font-size: 16px;
            font-weight: 600;
        }
        #btcPage .chart-change.green { color: #4caf50; }
        #btcPage .chart-change.red { color: #f44336; }
    </style>
</head>
<body>

    <div class="app" id="appContainer">
        <div class="top-buttons">
            <button class="top-btn" id="indicatorsBtn">Индикаторы</button>
            <button class="top-btn" id="chartsBtn">Графики</button>
        </div>

        <div id="mainPage">
            <div class="coins-list" id="coinsList">
                <div class="loading">Загрузка данных...</div>
            </div>
        </div>
    </div>

    <!-- СТРАНИЦА АВТОРИЗАЦИИ -->
    <div id="authPage">
        <h2>Введите пароль</h2>
        <input type="password" id="authInput" placeholder="Введите пароль">
        <button class="auth-btn" id="authBtn">Войти</button>
        <div class="error-msg" id="authError">Неверный пароль</div>
    </div>

    <!-- СТРАНИЦА БИТКОИНА -->
    <div id="btcPage">
        <button class="back-btn" id="backFromBtc">←</button>

        <div class="chart-price" id="chartPrice">$0.00</div>
        <div class="chart-change" id="chartChange">+0.00%</div>

        <div class="chart-container" id="chartContainer">
            <iframe id="tradingviewFrame" src=""></iframe>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        document.getElementById('indicatorsBtn').addEventListener('click', function() {
            tg.sendData('indicators');
            tg.close();
        });

        document.getElementById('chartsBtn').addEventListener('click', function() {
            tg.sendData('charts');
            tg.close();
        });

        const coins = [
            { id: 'bitcoin', name: 'Bitcoin', symbol: 'btc', icon: '₿' },
            { id: 'ethereum', name: 'Ethereum', symbol: 'eth', icon: '⟠' },
            { id: 'ripple', name: 'XRP', symbol: 'xrp', icon: '✕' },
            { id: 'hyperliquid', name: 'Hype', symbol: 'hype', icon: '◆' }
        ];

        let btcPrice = 0;
        let btcChange = 0;
        let currentUser = null;
        let frameLoaded = false;

        // Получаем ID пользователя Telegram
        const userId = tg.initDataUnsafe?.user?.id || 'guest';

        async function fetchCoinData() {
            try {
                const ids = coins.map(c => c.id).join(',');
                const url =
                    `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`;
                const response = await fetch(url);
                const data = await response.json();

                const list = document.getElementById('coinsList');
                list.innerHTML = '';

                coins.forEach((coin, index) => {
                    const info = data[coin.id];
                    if (!info) return;

                    const price = info.usd;
                    const change = info.usd_24h_change;
                    const changeClass = change >= 0 ? 'green' : 'red';
                    const changeText = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';

                    if (coin.id === 'bitcoin') {
                        btcPrice = price;
                        btcChange = change;
                    }

                    const item = document.createElement('div');
                    item.className = 'coin-item';
                    item.innerHTML = `
                        <span class="coin-number">${index + 1}</span>
                        <div class="coin-icon ${coin.symbol}">${coin.icon}</div>
                        <div class="coin-info">
                            <div class="coin-name">${coin.name}</div>
                            <div class="coin-symbol">${coin.symbol.toUpperCase()}</div>
                        </div>
                        <div class="coin-price">$${price.toFixed(2)}</div>
                        <div class="coin-change ${changeClass}">${changeText}</div>
                    `;
                    item.addEventListener('click', function() {
                        if (coin.id === 'bitcoin') {
                            showAuthPage();
                        }
                    });
                    list.appendChild(item);
                });

            } catch (e) {
                document.getElementById('coinsList').innerHTML = '<div class="loading">Ошибка загрузки данных</div>';
            }
        }

        function showAuthPage() {
            document.getElementById('appContainer').style.display = 'none';
            document.getElementById('authPage').style.display = 'flex';
            document.getElementById('authInput').value = '';
            document.getElementById('authInput').focus();
            document.getElementById('authError').style.display = 'none';
        }

        document.getElementById('authBtn').addEventListener('click', function() {
            const password = document.getElementById('authInput').value.trim();
            
            if (!password) {
                document.getElementById('authError').textContent = 'Введите пароль';
                document.getElementById('authError').style.display = 'block';
                return;
            }

            // Сохраняем пользователя с его паролем
            currentUser = password;
            localStorage.setItem('user_' + userId, password);
            
            document.getElementById('authPage').style.display = 'none';
            openBtcPage();
        });

        document.getElementById('authInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('authBtn').click();
            }
        });

        function openBtcPage() {
            document.getElementById('btcPage').style.display = 'flex';

            const changeClass = btcChange >= 0 ? 'green' : 'red';
            const changeText = (btcChange >= 0 ? '+' : '') + btcChange.toFixed(2) + '%';

            document.getElementById('chartPrice').textContent = '$' + btcPrice.toFixed(2);
            const changeEl = document.getElementById('chartChange');
            changeEl.textContent = changeText;
            changeEl.className = 'chart-change ' + changeClass;

            const frame = document.getElementById('tradingviewFrame');
            
            // Загружаем график
            frame.src =
                `https://s.tradingview.com/widgetembed/?hideideas=1&symbol=BINANCE:BTCUSDT&interval=1D&theme=dark&style=1&locale=ru&allow_symbol_change=0&hide_volume=0&hide_side_toolbar=0&hide_top_toolbar=0&save_image=1&studies=RSI%2CMACD&widget_lang=ru&hide_button=1&hide_watchlist=1&hide_news=1&hide_quick_links=1&hide_alert=1&hide_alert_button=1`;

            // Восстанавливаем сохранённое состояние пользователя
            const savedState = localStorage.getItem('chart_state_' + userId + '_' + currentUser);
            if (savedState) {
                setTimeout(() => {
                    try {
                        const state = JSON.parse(savedState);
                        frame.contentWindow.postMessage({
                            name: 'restore',
                            data: state
                        }, '*');
                    } catch(e) {
                        console.log('Ошибка восстановления');
                    }
                }, 3000);
            }
        }

        // Сохраняем состояние перед выходом
        document.getElementById('backFromBtc').addEventListener('click', function() {
            const frame = document.getElementById('tradingviewFrame');
            
            // Сохраняем состояние
            try {
                const state = {
                    savedAt: Date.now(),
                    user: currentUser
                };
                localStorage.setItem('chart_state_' + userId + '_' + currentUser, JSON.stringify(state));
            } catch(e) {
                console.log('Ошибка сохранения');
            }
            
            document.getElementById('btcPage').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
            
            // Очищаем состояние пользователя
            currentUser = null;
        });

        // Проверяем, есть ли сохранённый пароль при открытии приложения
        function checkSavedPassword() {
            const savedPassword = localStorage.getItem('user_' + userId);
            if (savedPassword) {
                // Автоматически входим
                currentUser = savedPassword;
                // Но сначала показываем главную страницу
                document.getElementById('appContainer').style.display = 'flex';
            }
        }

        fetchCoinData();
        setInterval(fetchCoinData, 60000);
        checkSavedPassword();
    </script>

</body>
</html>
