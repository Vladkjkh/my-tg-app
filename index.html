<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приложение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-image: url('https://avatars.mds.yandex.net/get-entity_search/2356618/969838143/orig');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }

        .top-buttons {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 2;
            gap: 20px;
        }
        .top-btn {
            flex: 1;
            aspect-ratio: 1 / 1;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .top-btn:active {
            transform: scale(0.95);
            opacity: 0.7;
        }

        .line-container {
            position: absolute;
            top: 132px;
            left: 0;
            right: 0;
            z-index: 2;
            display: flex;
            justify-content: center;
            padding: 0 20px;
        }
        .line {
            width: 100%;
            max-width: 220px;
            height: 1px;
            background: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="top-buttons">
        <button class="top-btn" id="indicatorsBtn">Индикаторы</button>
        <button class="top-btn" id="chartsBtn">Графики</button>
    </div>

    <div class="line-container">
        <div class="line"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        document.getElementById('indicatorsBtn').addEventListener('click', function() {
            tg.sendData('indicators');
            tg.close();
        });

        document.getElementById('chartsBtn').addEventListener('click', function() {
            tg.sendData('charts');
            tg.close();
        });
    </script>

</body>
</html>
