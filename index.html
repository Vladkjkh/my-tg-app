<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%;font-family:Arial,sans-serif;background:#000;overflow:hidden}
        body{background-image:url('https://avatars.mds.yandex.net/get-entity_search/2356618/969838143/orig');background-size:cover;background-position:center;display:flex;align-items:flex-start;justify-content:center;position:relative}
        body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.65);z-index:0}
        .app{position:relative;z-index:1;width:100%;max-width:100%;height:100vh;display:flex;flex-direction:column}
        .top-btn{display:block;width:calc(100% - 32px);margin:20px 16px 0;padding:20px 0;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:16px;color:#fff;font-size:20px;font-weight:700;cursor:pointer;backdrop-filter:blur(8px);text-align:center;flex-shrink:0}
        .top-btn:active{transform:scale(.98);background:rgba(255,255,255,0.2)}
        .content{flex:1;overflow:hidden;padding:10px 16px 0}
        #mainPage{display:flex;flex-direction:column;height:100%}
        .coins-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;padding-bottom:10px}
        .coin-item{display:flex;align-items:center;padding:10px 16px;background:rgba(255,255,255,0.05);backdrop-filter:blur(4px);border-radius:12px;border:1px solid rgba(255,255,255,0.06);cursor:pointer;gap:10px}
        .coin-item:active{transform:scale(.98);background:rgba(255,255,255,0.1)}
        .coin-number{color:rgba(255,255,255,0.25);font-size:12px;font-weight:700;width:20px;flex-shrink:0}
        .coin-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
        .coin-icon.btc{background:#f7931a}.coin-icon.eth{background:#627eea}.coin-icon.bnb{background:#f0b90b}.coin-icon.xrp{background:#00aae4}.coin-icon.sol{background:#9945ff}.coin-icon.trx{background:#ef0027}.coin-icon.hype{background:#8b5cf6}
        .coin-info{flex:1;min-width:0}
        .coin-name{color:#fff;font-size:15px;font-weight:600}
        .coin-symbol{color:rgba(255,255,255,0.35);font-size:10px;text-transform:uppercase}
        .coin-price{color:#fff;font-size:15px;font-weight:600;white-space:nowrap;min-width:70px;text-align:right}
        .coin-change-24h{font-size:13px;font-weight:600;min-width:55px;text-align:right}
        .coin-change-24h.green{color:#4caf50}.coin-change-24h.red{color:#f44336}
        .loading{color:rgba(255,255,255,0.5);text-align:center;padding:30px 0;font-size:14px}
        #indicatorsPage{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e27;z-index:999;padding:20px;flex-direction:column;align-items:center;overflow-y:auto}
        #indicatorsPage .back-btn{position:absolute;top:16px;left:16px;z-index:10;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:20px;padding:6px 14px;border-radius:20px;cursor:pointer}
        #indicatorsPage .back-btn:active{transform:scale(.95);opacity:.7}
        .indicator-box{width:100%;max-width:600px;margin:80px 0 0 0;padding:20px 15px 15px;background:linear-gradient(135deg,#1a1a3e,#0a0e27);border-radius:16px;border:2px solid rgba(255,193,7,0.3);box-shadow:0 8px 32px rgba(255,193,7,0.15);margin-bottom:20px}
        .indicator-title{color:#ffc107;font-size:16px;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;text-align:center}
        .indicator-subtitle{color:rgba(255,255,255,0.5);font-size:11px;text-align:center;margin-bottom:10px}
        .indicator-chart-container{width:100%;height:150px;position:relative}
        .indicator-chart-container canvas{width:100%!important;height:100%!important}
        .indicator-stats{display:flex;justify-content:space-between;padding:8px 5px 0;border-top:1px solid rgba(255,255,255,0.05);margin-top:8px}
        .indicator-stat{text-align:center;flex:1}
        .indicator-stat-label{color:rgba(255,255,255,0.4);font-size:9px;text-transform:uppercase;letter-spacing:.5px}
        .indicator-stat-value{font-size:14px;font-weight:700;margin-top:2px}
        .indicator-stat-value.positive{color:#4caf50}.indicator-stat-value.negative{color:#f44336}
        #chartPage{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e27;z-index:999;flex-direction:column;padding:12px}
        #chartPage .back-btn{position:absolute;top:16px;left:16px;z-index:10;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:20px;padding:6px 14px;border-radius:20px;cursor:pointer}
        #chartPage .back-btn:active{transform:scale(.95);opacity:.7}
        #chartPage .chart-header{color:#fff;font-size:20px;font-weight:700;text-align:center;margin-top:50px;margin-bottom:4px}
        #chartPage .chart-price-display{color:#fff;font-size:28px;font-weight:700;text-align:center}
        #chartPage .chart-price-display.touch{color:#ffc107}
        #chartPage .chart-change-display{text-align:center;font-size:16px;font-weight:600;margin-bottom:8px}
        #chartPage .chart-change-display.green{color:#4caf50}#chartPage .chart-change-display.red{color:#f44336}
        #chartPage .chart-container-main{flex:1;width:100%;min-height:0;position:relative;touch-action:none}
        #chartPage .chart-container-main canvas{width:100%!important;height:100%!important;touch-action:none}
        #chartPage .timeframes{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:8px 0 12px;flex-shrink:0}
        #chartPage .timeframe-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:rgba(255,255,255,0.6);font-size:11px;font-weight:600;padding:5px 12px;cursor:pointer}
        #chartPage .timeframe-btn.active{background:rgba(255,255,255,0.15);color:#fff;border-color:rgba(255,255,255,0.3)}
        #chartPage .timeframe-btn:active{transform:scale(.95)}
        .crosshair-line-h{pointer-events:none;position:absolute;border-top:1px dashed rgba(255,255,255,0.4);z-index:5}
        .crosshair-line-v{pointer-events:none;position:absolute;border-left:1px dashed rgba(255,255,255,0.4);z-index:5}
        .crosshair-label{pointer-events:none;position:absolute;color:#ffc107;font-size:12px;font-weight:700;background:rgba(0,0,0,0.7);padding:2px 6px;border-radius:4px;z-index:6}
    </style>
</head>
<body>

<div class="app" id="app">
    <button class="top-btn" id="mainBtn">Индикаторы</button>
    <div class="content">
        <div id="mainPage"><div class="coins-list" id="list"><div class="loading">Загрузка...</div></div></div>
    </div>
</div>

<div id="indicatorsPage">
    <button class="back-btn" id="backInd">←</button>
    <div class="indicator-box">
        <div class="indicator-title">₿ Bitcoin ETF</div>
        <div class="indicator-subtitle">Притоки / Оттоки за 30 дней</div>
        <div class="indicator-chart-container"><canvas id="btcEtf"></canvas></div>
        <div class="indicator-stats">
            <div class="indicator-stat"><div class="indicator-stat-label">Всего</div><div class="indicator-stat-value" id="btcTotal">+$0.0M</div></div>
            <div class="indicator-stat"><div class="indicator-stat-label">Средний</div><div class="indicator-stat-value" id="btcAvg">$0.0M</div></div>
            <div class="indicator-stat"><div class="indicator-stat-label">Макс приток</div><div class="indicator-stat-value positive" id="btcMax">$0.0M</div></div>
            <div class="indicator-stat"><div class="indicator-stat-label">Макс отток</div><div class="indicator-stat-value negative" id="btcMin">$0.0M</div></div>
        </div>
    </div>
    <div class="indicator-box">
        <div class="indicator-title">⟠ Ethereum ETF</div>
        <div class="indicator-subtitle">Притоки / Оттоки за 30 дней</div>
        <div class="indicator-chart-container"><canvas id="ethEtf"></canvas></div>
        <div class="indicator-stats">
            <div class="indicator-stat"><div class="indicator-stat-label">Всего</div><div class="indicator-stat-value" id="ethTotal">+$0.0M</div></div>
            <div class="indicator-stat"><div class="indicator-stat-label">Средний</div><div class="indicator-stat-value" id="ethAvg">$0.0M</div></div>
            <div class="indicator-stat"><div class="indicator-stat-label">Макс приток</div><div class="indicator-stat-value positive" id="ethMax">$0.0M</div></div>
            <div class="indicator-stat"><div class="indicator-stat-label">Макс отток</div><div class="indicator-stat-value negative" id="ethMin">$0.0M</div></div>
        </div>
    </div>
</div>

<div id="chartPage">
    <button class="back-btn" id="backChart">←</button>
    <div class="chart-header" id="chartTitle">Bitcoin</div>
    <div class="chart-price-display" id="chartPrice">$0.00</div>
    <div class="chart-change-display" id="chartChange">+0.00%</div>
    <div class="chart-container-main" id="chartContainer">
        <canvas id="priceChart"></canvas>
        <div class="crosshair-line-h" id="chH"></div>
        <div class="crosshair-line-v" id="chV"></div>
        <div class="crosshair-label" id="chL">$0.00</div>
    </div>
    <div class="timeframes">
        <button class="timeframe-btn" data-days="0.166">4ч</button>
        <button class="timeframe-btn" data-days="0.5">12ч</button>
        <button class="timeframe-btn active" data-days="1">1д</button>
        <button class="timeframe-btn" data-days="7">1н</button>
        <button class="timeframe-btn" data-days="30">1м</button>
        <button class="timeframe-btn" data-days="90">3м</button>
        <button class="timeframe-btn" data-days="180">6м</button>
        <button class="timeframe-btn" data-days="365">1г</button>
    </div>
</div>

<script>
const $=id=>document.getElementById(id), tg=window.Telegram.WebApp;
tg.ready();tg.expand();

let chart=null,coinId='bitcoin',days=1,interval=null,price=0,touch=false;
const coins=[{id:'bitcoin',name:'Bitcoin',symbol:'btc',icon:'₿'},{id:'ethereum',name:'Ethereum',symbol:'eth',icon:'⟠'},{id:'binancecoin',name:'BNB',symbol:'bnb',icon:'B'},{id:'ripple',name:'XRP',symbol:'xrp',icon:'✕'},{id:'solana',name:'Solana',symbol:'sol',icon:'◎'},{id:'tron',name:'TRX',symbol:'trx',icon:'T'},{id:'hyperliquid',name:'Hype',symbol:'hype',icon:'◆'}], map=Object.fromEntries(coins.map(c=>[c.id,c.name]));

$('mainBtn').onclick=()=>{$('app').style.display='none';$('indicatorsPage').style.display='flex';initETFs()};
$('backInd').onclick=()=>{$('indicatorsPage').style.display='none';$('app').style.display='flex'};
$('backChart').onclick=()=>{clearInterval(interval);interval=null;$('chartPage').style.display='none';$('app').style.display='flex'};

function genData(n=30){let d=[],v=0;for(let i=0;i<n;i++){v=Math.max(-100,Math.min(100,v+(Math.random()-.5)*80));d.push(Math.round(v*10)/10)}return d}

function drawETF(id,data,color,prefix){
    const ctx=$('btcEtf').getContext('2d');
    if(window._etf)window._etf.destroy();
    const colors=data.map(v=>v>=0?color:'#f44336'), total=data.reduce((a,b)=>a+b,0), avg=total/data.length, max=Math.max(...data), min=Math.min(...data);
    const set=(el,v,c)=>{const e=$(el);if(e){e.textContent=v;e.className='indicator-stat-value '+(c||'')}};
    set(prefix+'Total',(total>=0?'+':'')+total.toFixed(1)+'M',total>=0?'positive':'negative');
    set(prefix+'Avg','$'+avg.toFixed(1)+'M');
    set(prefix+'Max','+$'+max.toFixed(1)+'M','positive');
    set(prefix+'Min','-$'+Math.abs(min).toFixed(1)+'M','negative');
    window._etf=new Chart(ctx,{type:'bar',data:{labels:data.map((_,i)=>i+1),datasets:[{data,backgroundColor:colors,borderColor:colors,borderWidth:1,borderRadius:2,barPercentage:.8,categoryPercentage:.9}]},options:{responsive:!0,maintainAspectRatio:!1,plugins:{legend:{display:!1},tooltip:{callbacks:{label:ctx=>{const v=ctx.parsed.y;return(v>=0?'Приток: +':'Отток: ')+v.toFixed(1)+'M'}}}},scales:{x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'rgba(255,255,255,0.2)',maxTicksLimit:10,font:{size:7}}},y:{grid:{color:'rgba(255,255,255,0.08)'},ticks:{color:'rgba(255,255,255,0.2)',callback:v=>(v>=0?'+':'')+v+'M',font:{size:8}}}}},plugins:[{afterDraw:chart=>{const y=chart.scales.y,x=chart.scales.x,z=y.getPixelForValue(0),ctx=chart.ctx;ctx.save();ctx.beginPath();ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);ctx.moveTo(x.left,z);ctx.lineTo(x.right,z);ctx.stroke();ctx.restore();ctx.save();ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='8px Arial';ctx.textAlign='left';ctx.fillText('0',x.right+2,z+3);ctx.restore()}}]});
}

function initETFs(){drawETF('btcEtf',genData(),'#f7931a','btc');drawETF('ethEtf',genData(),'#627eea','eth')}

async function fetchData(id,d){try{const r=await fetch(`https://api.coingecko.com/api/v3/coins/${id}/market_chart?vs_currency=usd&days=${d}`);return r.ok?(await r.json()).prices||[]}catch{return[]}}

function drawChart(ctx,prices){
    const labels=prices.map(p=>{const d=new Date(p[0]);return days>=180?d.toLocaleDateString('ru-RU',{month:'short',year:'numeric'}):d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'})}), vals=prices.map(p=>p[1]);
    window._vals=vals;window._prices=prices;
    const grad=ctx.createLinearGradient(0,0,0,300);grad.addColorStop(0,'rgba(255,193,7,0.3)');grad.addColorStop(1,'rgba(255,193,7,0.0)');
    chart=new Chart(ctx,{type:'line',data:{labels,datasets:[{data:vals,borderColor:'#ffc107',backgroundColor:grad,fill:!0,tension:.4,pointRadius:0,pointHoverRadius:6,borderWidth:2}]},options:{responsive:!0,maintainAspectRatio:!1,plugins:{legend:{display:!1},tooltip:{enabled:!1}},scales:{x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'rgba(255,255,255,0.4)',maxTicksLimit:10,maxRotation:30}},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'rgba(255,255,255,0.4)',callback:v=>'$'+v.toFixed(0)}}}}});
    if(prices.length)price=prices[prices.length-1][1];
}

function updateCrosshair(x,y){
    const canvas=$('priceChart');if(!canvas||!chart)return;
    const rect=canvas.getBoundingClientRect(), area=chart.chartArea, xs=chart.scales.x, ys=chart.scales.y;
    let idx=0,dist=Infinity;
    for(let i=0;i<window._vals.length;i++){const d=Math.abs(xs.getPixelForValue(i)-(x-rect.left));if(d<dist){dist=d;idx=i}}
    const xp=xs.getPixelForValue(idx), yp=ys.getPixelForValue(window._vals[idx]);
    if(xp<area.left||xp>area.right||yp<area.top||yp>area.bottom){hideCrosshair();return}
    const cr=$('chartContainer').getBoundingClientRect();
    $('chH').style.cssText=`display:block;left:0;width:100%;top:${yp-cr.top}px`;
    $('chV').style.cssText=`display:block;top:0;height:100%;left:${xp-cr.left}px`;
    $('chL').style.cssText=`display:block;left:${xp-cr.left+10}px;top:${yp-cr.top-10}px`;
    $('chL').textContent='$'+window._vals[idx].toFixed(2);
    $('chartPrice').textContent='$'+window._vals[idx].toFixed(2);
    $('chartPrice').classList.add('touch');touch=!0;
}

function hideCrosshair(){['chH','chV','chL'].forEach(id=>{const e=$(id);if(e)e.style.display='none'});if(touch){$('chartPrice').textContent='$'+price.toFixed(2);$('chartPrice').classList.remove('touch');touch=!1}}

async function updateChart(id,d){
    const prices=await fetchData(id,d);if(!prices.length)return;
    price=prices[prices.length-1][1];
    const prev=prices[0][1], chg=prev?((price-prev)/prev*100):0;
    if(!touch){$('chartPrice').textContent='$'+price.toFixed(2);$('chartPrice').classList.remove('touch')}
    const cls=chg>=0?'green':'red';
    $('chartChange').textContent=(chg>=0?'+':'')+chg.toFixed(2)+'%';
    $('chartChange').className='chart-change-display '+cls;
    const ctx=$('priceChart').getContext('2d');if(chart)chart.destroy();drawChart(ctx,prices);hideCrosshair();
}

function openChart(id){
    coinId=id;$('app').style.display='none';$('chartPage').style.display='flex';
    $('chartTitle').textContent=map[id]||id;
    document.querySelectorAll('.timeframe-btn').forEach(b=>b.classList.remove('active'));
    document.querySelector('.timeframe-btn[data-days="1"]').classList.add('active');
    days=1;touch=!1;updateChart(id,1);
    clearInterval(interval);interval=setInterval(()=>updateChart(coinId,days),60000);
}

document.querySelectorAll('.timeframe-btn').forEach(b=>{b.onclick=function(){document.querySelectorAll('.timeframe-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');days=parseFloat(this.dataset.days);touch=!1;updateChart(coinId,days)}});

['mousemove','touchmove'].forEach(ev=>{$('priceChart').addEventListener(ev,function(e){e.preventDefault();const c=ev==='touchmove'?e.touches[0]:e;updateCrosshair(c.clientX,c.clientY)},{passive:!1})});
$('priceChart').addEventListener('mouseleave',hideCrosshair);
$('priceChart').addEventListener('touchend',hideCrosshair);
$('priceChart').addEventListener('touchstart',function(e){e.preventDefault();const t=e.touches[0];updateCrosshair(t.clientX,t.clientY)},{passive:!1});

let cache=null;
async function loadCoins(){
    try{
        if(cache)render(cache);
        const data=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coins.map(c=>c.id).join(',')}&vs_currencies=usd&include_24hr_change=true`);
        if(!data.ok)throw new Error();
        const json=await data.json();cache=json;render(json);
    }catch(e){if(!cache){$('list').innerHTML='<div class="loading">Ошибка. Повтор...</div>';setTimeout(loadCoins,3000)}}
}

function render(data){
    const list=$('list');if(!list)return;list.innerHTML='';
    coins.forEach((c,i)=>{
        const info=data[c.id], div=document.createElement('div');div.className='coin-item';
        if(!info)div.innerHTML=`<span class="coin-number">${i+1}</span><div class="coin-icon ${c.symbol}">${c.icon}</div><div class="coin-info"><div class="coin-name">${c.name}</div><div class="coin-symbol">${c.symbol.toUpperCase()}</div></div><div class="coin-price">--</div><div class="coin-change-24h" style="color:rgba(255,255,255,0.3);">--</div>`;
        else{const p=info.usd,ch=info.usd_24h_change||0,cls=ch>=0?'green':'red';div.innerHTML=`<span class="coin-number">${i+1}</span><div class="coin-icon ${c.symbol}">${c.icon}</div><div class="coin-info"><div class="coin-name">${c.name}</div><div class="coin-symbol">${c.symbol.toUpperCase()}</div></div><div class="coin-price">$${p.toFixed(2)}</div><div class="coin-change-24h ${cls}">${(ch>=0?'+':'')+ch.toFixed(2)}%</div>`}
        div.onclick=()=>openChart(c.id);list.appendChild(div)
    });
}
loadCoins();setInterval(loadCoins,60000);
</script>
</body>
</html>
