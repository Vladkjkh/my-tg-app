// Функция для загрузки данных из API (попытка)
async function loadDataFromAPI() {
    const statusEl = document.getElementById('statusMessage');
    const API_KEY = 'SOSO-8cfbe60c06bf4678a1965a440eb24de7';
    
    try {
        statusEl.textContent = '⏳ Загрузка данных с API...';
        
        // Пробуем разные варианты URL
        const urls = [
            `https://api.sosovolume.com/api/v1/etf/btc?api_key=${API_KEY}`,
            `https://api.sosovolume.com/v1/etf/btc?api_key=${API_KEY}`,
            `https://api.sosovolume.com/etf/btc?api_key=${API_KEY}`
        ];
        
        let btcData = null;
        for (let url of urls) {
            try {
                const response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    if (data && (Array.isArray(data) || data.data)) {
                        btcData = Array.isArray(data) ? data : data.data;
                        if (btcData && btcData.length > 0) break;
                    }
                }
            } catch(e) {}
        }
        
        if (btcData && btcData.length > 0) {
            etfDataStore.btc = btcData;
            statusEl.textContent = '✅ Данные BTC загружены!';
        } else {
            statusEl.textContent = '⚠️ API не отвечает, использую локальные данные';
            etfDataStore.btc = YOUR_API_DATA.btc;
        }
        
        // Аналогично для ETH
        let ethData = null;
        for (let url of urls) {
            try {
                const ethUrl = url.replace('btc', 'eth');
                const response = await fetch(ethUrl);
                if (response.ok) {
                    const data = await response.json();
                    if (data && (Array.isArray(data) || data.data)) {
                        ethData = Array.isArray(data) ? data : data.data;
                        if (ethData && ethData.length > 0) break;
                    }
                }
            } catch(e) {}
        }
        
        if (ethData && ethData.length > 0) {
            etfDataStore.eth = ethData;
            statusEl.textContent = '✅ Данные ETH загружены!';
        } else {

        etfDataStore.btc = YOUR_API_DATA.btc;
        etfDataStore.eth = YOUR_API_DATA.eth;
        updateDateInfo();
        initETFs();
        return false;
    }

function drawETFChart(canvasId, data, color, prefix) {
    const ctx = document.getElementById(canvasId);
    if (!ctx) return;
    
    if (etfInstances[canvasId]) {
        etfInstances[canvasId].destroy();
        delete etfInstances[canvasId];
    }
    
    if (!data || data.length === 0) {
        const parent = ctx.parentElement;
        parent.innerHTML = '<div style="color: rgba(255,255,255,0.5); text-align: center; padding: 30px;">📭 Нет данных</div>';
        return;
    }
    
    const recentData = data.slice(0, 30).reverse();
    const values = recentData.map(d => d.net_inflow || 0);
    const labels = recentData.map(d => {
        const date = new Date(d.date);
        return date.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
    });
    
    if (values.every(v => v === 0)) {
        const parent = ctx.parentElement;
        parent.innerHTML = '<div style="color: rgba(255,255,255,0.5); text-align: center; padding: 30px;">📊 Нет данных для отображения</div>';
        return;
    }
    
    const total = values.reduce((a, b) => a + b, 0);
    const avg = total / values.length;
    const max = Math.max(...values);
    const min = Math.min(...values);
    
    const updateStat = (id, value, className = '') => {
        const el = document.getElementById(id);
        if (el) {
            el.textContent = value;
            el.className = 'indicator-stat-value ' + className;
        }
    };
    
    const totalM = total / 1e6;
    const avgM = avg / 1e6;
    const maxM = max / 1e6;
    const minM = min / 1e6;
    
    updateStat(prefix + 'Total', (totalM >= 0 ? '+' : '') + totalM.toFixed(1) + 'M', totalM >= 0 ? 'positive' : 'negative');
    updateStat(prefix + 'Avg', '$' + avgM.toFixed(1) + 'M');
    updateStat(prefix + 'Max', '+$' + maxM.toFixed(1) + 'M', 'positive');
    updateStat(prefix + 'Min', '-$' + Math.abs(minM).toFixed(1) + 'M', 'negative');
    
    const barColors = values.map(v => v >= 0 ? color : '#f44336');
    
    etfInstances[canvasId] = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                data: values.map(v => v / 1e6),
                backgroundColor: barColors,
                borderColor: barColors,
                borderWidth: 1,
                borderRadius: 2,
                barPercentage: 0.8,
                categoryPercentage: 0.9
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            const val = context.parsed.y;
                            return (val >= 0 ? 'Приток: +' : 'Отток: ') + val.toFixed(1) + 'M';
                        }
                    }
                }
            },
            scales: {
                x: {
                    grid: { color: 'rgba(255,255,255,0.05)' },
                    ticks: { color: 'rgba(255,255,255,0.2)', maxTicksLimit: 10, font: { size: 7 } }
                },
                y: {
                    grid: { color: 'rgba(255,255,255,0.08)' },
                    ticks: { 
                        color: 'rgba(255,255,255,0.2)', 
                        callback: v => (v >= 0 ? '+' : '') + v + 'M',
                        font: { size: 8 }
                    }
                }
            }
        },
        plugins: [{
            afterDraw: function(chart) {
                const yScale = chart.scales.y;
                const xScale = chart.scales.x;
                const ctx = chart.ctx;
                const zeroY = yScale.getPixelForValue(0);
                
                ctx.save();
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([4, 4]);
                ctx.moveTo(xScale.left, zeroY);
                ctx.lineTo(xScale.right, zeroY);
                ctx.stroke();
                ctx.restore();
                
                ctx.save();
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.font = '8px Arial';
                ctx.textAlign = 'left';
                ctx.fillText('0', xScale.right + 2, zeroY + 3);
                ctx.restore();
            }
        }]
    });
}

function updateDateInfo() {
    const updateDate = (elementId, data) => {
        const el = document.getElementById(elementId);
        if (el && data && data.length > 0) {
            const latest = data[0];
            if (latest && latest.date) {
                const date = new Date(latest.date);
                const dateStr = date.toLocaleDateString('ru-RU', { 
                    day: '2-digit', 
                    month: '2-digit', 
                    year: 'numeric' 
                });
                el.textContent = `Притоки / Оттоки (данные на ${dateStr})`;
            }
        }
    };
    
    updateDate('btcUpdateDate', etfDataStore.btc);
    updateDate('ethUpdateDate', etfDataStore.eth);
}

function initETFs() {
    drawETFChart('btcEtf', etfDataStore.btc, '#f7931a', 'btc');
    drawETFChart('ethEtf', etfDataStore.eth, '#627eea', 'eth');
}
