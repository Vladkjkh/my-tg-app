<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приложение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #000;
        }

        body {
            background-image: url('https://avatars.mds.yandex.net/get-entity_search/2356618/969838143/orig');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            height: 100vh;
            padding: 20px 16px 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .top-buttons {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .top-btn {
            flex: 1;
            aspect-ratio: 1 / 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: 0.2s;
        }

        .top-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        /* ГЛАВНАЯ СТРАНИЦА */
        #mainPage {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .coins-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-top: 10px;
            padding-bottom: 10px;
        }

        .coin-item {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
            cursor: pointer;
            transition: 0.2s;
        }

        .coin-item:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.1);
        }

        .coin-number {
            color: rgba(255, 255, 255, 0.25);
            font-size: 12px;
            font-weight: bold;
            width: 22px;
        }

        .coin-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            flex-shrink: 0;
        }
        .coin-icon.btc { background: #f7931a; }
        .coin-icon.eth { background: #627eea; }
        .coin-icon.xrp { background: #00aae4; }
        .coin-icon.hype { background: #8b5cf6; }

        .coin-info {
            flex: 1;
        }
        .coin-name {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
        }
        .coin-symbol {
            color: rgba(255, 255, 255, 0.35);
            font-size: 11px;
            text-transform: uppercase;
        }

        .coin-price {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            margin-right: 12px;
            white-space: nowrap;
        }

        .coin-change {
            font-size: 13px;
            font-weight: 600;
            min-width: 60px;
            text-align: right;
            white-space: nowrap;
        }
        .coin-change.green { color: #4caf50; }
        .coin-change.red { color: #f44336; }

        .loading {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 30px 0;
            font-size: 14px;
        }

        /* СТРАНИЦА ГРАФИКА */
        #chartPage {
            display: none;
            flex-direction: column;
            flex: 1;
            background: #0a0e27;
            border-radius: 16px;
            padding: 16px;
            margin-top: 0;
            position: relative;
            overflow: hidden;
        }

        #chartPage .back-btn {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            font-size: 20px;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }

        #chartPage .back-btn:active {
            transform: scale(0.95);
            opacity: 0.7;
        }

        #chartPage .coin-title {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin-top: 4px;
            margin-bottom: 8px;
        }

        .chart-container {
            flex: 1;
            min-height: 0;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
        }

        .chart-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .timeframes {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 10px;
            flex-shrink: 0;
        }

        .timeframe-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            font-weight: 600;
            padding: 6px 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .timeframe-btn.active {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
        }

        .timeframe-btn:active {
            transform: scale(0.95);
        }

        .chart-price {
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 4px;
        }
        .chart-change {
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .chart-change.green { color: #4caf50; }
        .chart-change.red { color: #f44336; }
    </style>
</head>
<body>

    <div class="app">
        <div class="top-buttons">
            <button class="top-btn" id="indicatorsBtn">Индикаторы</button>
            <button class="top-btn" id="chartsBtn">Графики</button>
        </div>

        <!-- ГЛАВНАЯ СТРАНИЦА -->
        <div id="mainPage">
            <div class="coins-list" id="coinsList">
                <div class="loading">Загрузка данных...</div>
            </div>
        </div>

        <!-- СТРАНИЦА ГРАФИКА -->
        <div id="chartPage">
            <button class="back-btn" id="backToMain">←</button>
            <div class="coin-title" id="chartCoinTitle">Bitcoin</div>
            <div class="chart-price" id="chartPrice">$0.00</div>
            <div class="chart-change" id="chartChange">+0.00%</div>
            <div class="chart-container" id="chartContainer">
                <iframe id="tradingviewFrame" src=""></iframe>
            </div>
            <div class="timeframes">
                <button class="timeframe-btn" data-interval="1D">1день</button>
                <button class="timeframe-btn active" data-interval="4h">4часа</button>
                <button class="timeframe-btn" data-interval="1h">1час</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ----- КНОПКИ ВЕРХНИЕ -----
        document.getElementById('indicatorsBtn').addEventListener('click', function() {
            tg.sendData('indicators');
            tg.close();
        });

        document.getElementById('chartsBtn').addEventListener('click', function() {
            tg.sendData('charts');
            tg.close();
        });

        // ----- ДАННЫЕ МОНЕТ -----
        const coins = [
            { id: 'bitcoin', name: 'Bitcoin', symbol: 'btc', icon: '₿' },
            { id: 'ethereum', name: 'Ethereum', symbol: 'eth', icon: '⟠' },
            { id: 'ripple', name: 'XRP', symbol: 'xrp', icon: '✕' },
            { id: 'hyperliquid', name: 'Hype', symbol: 'hype', icon: '◆' }
        ];

        let currentCoin = 'bitcoin';
        let currentInterval = '4h';

        // ----- ЗАГРУЗКА ЦЕН -----
        async function fetchCoinData() {
            try {
                const ids = coins.map(c => c.id).join(',');
                const url =
                    `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`;
                const response = await fetch(url);
                const data = await response.json();

                const list = document.getElementById('coinsList');
                list.innerHTML = '';

                coins.forEach((coin, index) => {
                    const info = data[coin.id];
                    if (!info) return;

                    const price = info.usd;
                    const change = info.usd_24h_change;
                    const changeClass = change >= 0 ? 'green' : 'red';
                    const changeText = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';

                    const item = document.createElement('div');
                    item.className = 'coin-item';
                    item.innerHTML = `
                        <span class="coin-number">${index + 1}</span>
                        <div class="coin-icon ${coin.symbol}">${coin.icon}</div>
                        <div class="coin-info">
                            <div class="coin-name">${coin.name}</div>
                            <div class="coin-symbol">${coin.symbol.toUpperCase()}</div>
                        </div>
                        <div class="coin-price">$${price.toFixed(2)}</div>
                        <div class="coin-change ${changeClass}">${changeText}</div>
                    `;
                    item.addEventListener('click', function() {
                        openChart(coin.id, coin.name, price, change, changeClass, changeText);
                    });
                    list.appendChild(item);
                });

            } catch (e) {
                document.getElementById('coinsList').innerHTML = '<div class="loading">Ошибка загрузки данных</div>';
            }
        }

        // ----- ОТКРЫТЬ ГРАФИК -----
        function openChart(coinId, coinName, price, change, changeClass, changeText) {
            currentCoin = coinId;
            document.getElementById('mainPage').style.display = 'none';
            document.getElementById('chartPage').style.display = 'flex';

            document.getElementById('chartCoinTitle').textContent = coinName;
            document.getElementById('chartPrice').textContent = '$' + price.toFixed(2);
            const changeEl = document.getElementById('chartChange');
            changeEl.textContent = changeText;
            changeEl.className = 'chart-change ' + changeClass;

            updateChart(coinId, currentInterval);
        }

        // ----- ОБНОВИТЬ ГРАФИК -----
        function updateChart(coinId, interval) {
            const symbol = coinId === 'bitcoin' ? 'BTC' :
                           coinId === 'ethereum' ? 'ETH' :
                           coinId === 'ripple' ? 'XRP' : 'HYPE';
            const frame = document.getElementById('tradingviewFrame');
            frame.src = `https://s.tradingview.com/widgetembed/?hideideas=1&symbol=CRYPTO:${symbol}USD&interval=${interval}`;
        }

        // ----- КНОПКИ ТАЙМФРЕЙМОВ -----
        document.querySelectorAll('.timeframe-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentInterval = this.dataset.interval;
                updateChart(currentCoin, currentInterval);
            });
        });

        // ----- КНОПКА НАЗАД -----
        document.getElementById('backToMain').addEventListener('click', function() {
            document.getElementById('chartPage').style.display = 'none';
            document.getElementById('mainPage').style.display = 'flex';
        });

        // ----- ЗАПУСК -----
        fetchCoinData();
        setInterval(fetchCoinData, 60000);
    </script>

</body>
</html>
