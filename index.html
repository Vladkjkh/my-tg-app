<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приложение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #000;
            overflow: hidden;
        }

        body {
            background-image: url('https://avatars.mds.yandex.net/get-entity_search/2356618/969838143/orig');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-btn {
            display: block;
            width: calc(100% - 32px);
            margin: 20px 16px 0 16px;
            padding: 14px 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(8px);
            text-align: center;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .top-btn:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.2);
        }

        .content {
            flex: 1;
            overflow: hidden;
            padding: 10px 16px 0 16px;
        }

        #mainPage {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .coins-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-bottom: 10px;
        }

        .coin-item {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
            cursor: pointer;
            transition: 0.2s;
            gap: 6px;
        }

        .coin-item:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.1);
        }

        .coin-number {
            color: rgba(255, 255, 255, 0.25);
            font-size: 10px;
            font-weight: bold;
            width: 16px;
            flex-shrink: 0;
        }

        .coin-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            flex-shrink: 0;
        }
        .coin-icon.btc { background: #f7931a; }
        .coin-icon.eth { background: #627eea; }
        .coin-icon.xrp { background: #00aae4; }
        .coin-icon.hype { background: #8b5cf6; }

        .coin-info {
            flex: 1;
            min-width: 0;
        }
        .coin-name {
            color: #fff;
            font-size: 13px;
            font-weight: 600;
        }
        .coin-symbol {
            color: rgba(255, 255, 255, 0.35);
            font-size: 9px;
            text-transform: uppercase;
        }

        .coin-price {
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
            min-width: 55px;
            text-align: right;
        }

        .coin-change-24h {
            font-size: 11px;
            font-weight: 600;
            min-width: 45px;
            text-align: right;
            flex-shrink: 0;
        }
        .coin-change-24h.green { color: #4caf50; }
        .coin-change-24h.red { color: #f44336; }

        .loading {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 30px 0;
            font-size: 14px;
        }

        /* ===== СТРАНИЦА ГРАФИКА ===== */
        #chartPage {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e27;
            z-index: 999;
            flex-direction: column;
            padding: 12px;
        }

        #chartPage .back-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            font-size: 20px;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
        }

        #chartPage .back-btn:active {
            transform: scale(0.95);
            opacity: 0.7;
        }

        #chartPage .chart-header {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin-top: 50px;
            margin-bottom: 4px;
        }

        #chartPage .chart-price-display {
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            transition: all 0.15s;
        }

        #chartPage .chart-price-display.touch {
            color: #ffc107;
        }

        #chartPage .chart-change-display {
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        #chartPage .chart-change-display.green { color: #4caf50; }
        #chartPage .chart-change-display.red { color: #f44336; }

        #chartPage .chart-container {
            flex: 1;
            width: 100%;
            min-height: 0;
            position: relative;
            touch-action: none;
        }

        #chartPage .chart-container canvas {
            width: 100% !important;
            height: 100% !important;
            touch-action: none;
        }

        #chartPage .timeframes {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            padding: 8px 0 12px 0;
            flex-shrink: 0;
        }

        #chartPage .timeframe-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 11px;
            font-weight: 600;
            padding: 5px 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        #chartPage .timeframe-btn.active {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
        }

        #chartPage .timeframe-btn:active {
            transform: scale(0.95);
        }

        /* ===== ПРОФИЛЬ ===== */
        #profilePage {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e27;
            z-index: 999;
            flex-direction: column;
            padding: 20px;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px 20px;
            margin-top: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 320px;
            align-self: center;
            width: 100%;
        }

        .profile-row {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar-box {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.15);
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .avatar-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-box .avatar-placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            text-align: center;
            line-height: 1.2;
        }

        .avatar-input {
            display: none;
        }

        .profile-fields {
            flex: 1;
        }

        .profile-fields .label {
            color: rgba(255, 255, 255, 0.4);
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 2px;
            display: block;
        }

        .profile-fields input {
            width: 100%;
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .profile-fields input:focus {
            border-color: #f7931a;
        }
    </style>
</head>
<body>

    <div class="app" id="appContainer">
        <button class="top-btn" id="mainBtn">Индикаторы</button>

        <div class="content">
            <div id="mainPage">
                <div class="coins-list" id="coinsList">
                    <div class="loading">Загрузка данных...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== СТРАНИЦА ГРАФИКА ===== -->
    <div id="chartPage">
        <button class="back-btn" id="backFromChart">←</button>

        <div class="chart-header" id="chartCoinTitle">Bitcoin</div>
        <div class="chart-price-display" id="chartPriceDisplay">$0.00</div>
        <div class="chart-change-display" id="chartChangeDisplay">+0.00%</div>
        <div class="chart-container" id="chartContainer">
            <canvas id="priceChart"></canvas>
        </div>
        <div class="timeframes" id="timeframesContainer">
            <button class="timeframe-btn" data-days="0.166">4ч</button>
            <button class="timeframe-btn" data-days="0.5">12ч</button>
            <button class="timeframe-btn active" data-days="1">1д</button>
            <button class="timeframe-btn" data-days="7">1н</button>
            <button class="timeframe-btn" data-days="30">1м</button>
            <button class="timeframe-btn" data-days="90">3м</button>
            <button class="timeframe-btn" data-days="90">6м</button>
        </div>
    </div>

    <!-- ===== ПРОФИЛЬ ===== -->
    <div id="profilePage">
        <div class="profile-card">
            <div class="profile-row">
                <div class="avatar-box" id="avatarBox">
                    <div class="avatar-placeholder" id="avatarPlaceholder">Загрузить</div>
                    <img id="avatarImage" style="display:none;">
                </div>
                <input type="file" class="avatar-input" id="avatarInput" accept="image/*">

                <div class="profile-fields">
                    <div class="field-group">
                        <span class="label">Никнейм</span>
                        <input type="text" id="nicknameInput" placeholder="Введите никнейм">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        document.getElementById('mainBtn').addEventListener('click', function() {
            tg.sendData('indicators');
            tg.close();
        });

        // ===== АВАТАРКА =====
        const avatarBox = document.getElementById('avatarBox');
        const avatarInput = document.getElementById('avatarInput');
        const avatarImage = document.getElementById('avatarImage');
        const avatarPlaceholder = document.getElementById('avatarPlaceholder');

        avatarBox.addEventListener('click', function() {
            avatarInput.click();
        });

        avatarInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    avatarImage.src = event.target.result;
                    avatarImage.style.display = 'block';
                    avatarPlaceholder.style.display = 'none';
                    localStorage.setItem('user_avatar', event.target.result);
                };
                reader.readAsDataURL(file);
            }
        });

        // ===== НИКНЕЙМ =====
        const nicknameInput = document.getElementById('nicknameInput');

        nicknameInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const nickname = nicknameInput.value.trim();
                if (nickname) {
                    localStorage.setItem('user_nickname', nickname);
                    tg.showAlert('Никнейм сохранён!');
                } else {
                    tg.showAlert('Введите никнейм');
                }
            }
        });

        function loadProfileData() {
            const savedAvatar = localStorage.getItem('user_avatar');
            if (savedAvatar) {
                avatarImage.src = savedAvatar;
                avatarImage.style.display = 'block';
                avatarPlaceholder.style.display = 'none';
            }

            const savedNickname = localStorage.getItem('user_nickname');
            if (savedNickname) {
                nicknameInput.value = savedNickname;
            }
        }

        // ===== ГРАФИК =====
        let chart = null;
        let currentCoinId = 'bitcoin';
        let currentDays = 1;
        let updateInterval = null;
        let currentPrice = 0;
        let isTouching = false;
        let touchPrice = 0;

        function getCoinDisplayName(coinId) {
            const map = {
                'bitcoin': 'Bitcoin',
                'ethereum': 'Ethereum',
                'ripple': 'XRP',
                'hyperliquid': 'Hype'
            };
            return map[coinId] || coinId;
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
        }

        async function fetchWithRetry(url, retries = 3) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url);
                    if (response.ok) {
                        return await response.json();
                    }
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, 1000 * (i + 1)));
                }
            }
            throw new Error('Не удалось загрузить данные');
        }

        async function fetchChartData(coinId, days) {
            try {
                let actualDays = days;
                if (days === 180) actualDays = 90;

                const url =
                    `https://api.coingecko.com/api/v3/coins/${coinId}/market_chart?vs_currency=usd&days=${actualDays}`;
                const data = await fetchWithRetry(url);
                return data.prices || [];
            } catch (e) {
                console.log('Ошибка загрузки данных графика:', e);
                return [];
            }
        }

        function drawLineChart(ctx, prices) {
            const labels = prices.map(p => formatDate(p[0]));
            const values = prices.map(p => p[1]);

            // Сохраняем данные для интерактива
            window._chartPrices = prices;
            window._chartLabels = labels;
            window._chartValues = values;

            const gradient = ctx.createLinearGradient(0, 0, 0, 300);
            gradient.addColorStop(0, 'rgba(255, 193, 7, 0.3)');
            gradient.addColorStop(1, 'rgba(255, 193, 7, 0.0)');

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Цена USD',
                        data: values,
                        borderColor: '#ffc107',
                        backgroundColor: gradient,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            enabled: false
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: 'rgba(255,255,255,0.4)', maxTicksLimit: 10, maxRotation: 0 }
                        },
                        y: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: {
                                color: 'rgba(255,255,255,0.4)',
                                callback: function(value) { return '$' + value.toFixed(0); }
                            }
                        }
                    },
                    onHover: function(event, elements) {
                        if (elements && elements.length > 0) {
                            const index = elements[0].index;
                            const price = window._chartValues[index];
                            const priceEl = document.getElementById('chartPriceDisplay');
                            priceEl.textContent = '$' + price.toFixed(2);
                            priceEl.classList.add('touch');
                            isTouching = true;
                            touchPrice = price;
                        } else {
                            if (!isTouching) return;
                            const priceEl = document.getElementById('chartPriceDisplay');
                            priceEl.textContent = '$' + currentPrice.toFixed(2);
                            priceEl.classList.remove('touch');
                            isTouching = false;
                        }
                    }
                }
            });

            // Добавляем кастомные линии при касании
            const canvas = document.getElementById('priceChart');
            const container = document.getElementById('chartContainer');

            canvas.addEventListener('touchstart', function(e) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;

                if (chart) {
                    const xAxis = chart.scales.x;
                    const yAxis = chart.scales.y;

                    // Находим ближайшую точку данных
                    const chartArea = chart.chartArea;
                    const xRatio = (x - chartArea.left) / (chartArea.right - chartArea.left);
                    const dataIndex = Math.round(xRatio * (window._chartValues.length - 1));
                    const clampedIndex = Math.max(0, Math.min(dataIndex, window._chartValues.length - 1));
                    const price = window._chartValues[clampedIndex];

                    const priceEl = document.getElementById('chartPriceDisplay');
                    priceEl.textContent = '$' + price.toFixed(2);
                    priceEl.classList.add('touch');
                    isTouching = true;
                    touchPrice = price;

                    // Рисуем линии
                    drawCrosshair(clampedIndex);
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', function(e) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;

                if (chart) {
                    const chartArea = chart.chartArea;
                    const xRatio = (x - chartArea.left) / (chartArea.right - chartArea.left);
                    const dataIndex = Math.round(xRatio * (window._chartValues.length - 1));
                    const clampedIndex = Math.max(0, Math.min(dataIndex, window._chartValues.length - 1));
                    const price = window._chartValues[clampedIndex];

                    const priceEl = document.getElementById('chartPriceDisplay');
                    priceEl.textContent = '$' + price.toFixed(2);
                    priceEl.classList.add('touch');
                    isTouching = true;
                    touchPrice = price;

                    drawCrosshair(clampedIndex);
                }
            }, { passive: false });

            canvas.addEventListener('touchend', function(e) {
                e.preventDefault();
                const priceEl = document.getElementById('chartPriceDisplay');
                priceEl.textContent = '$' + currentPrice.toFixed(2);
                priceEl.classList.remove('touch');
                isTouching = false;
                touchPrice = 0;
                // Очищаем линии
                drawCrosshair(-1);
            }, { passive: false });

            // Функция рисования перекрестия
            function drawCrosshair(index) {
                const canvas2 = document.getElementById('priceChart');
                const ctx2 = canvas2.getContext('2d');
                const chartArea = chart.chartArea;

                // Очищаем только область графика
                ctx2.clearRect(chartArea.left, chartArea.top, chartArea.right - chartArea.left, chartArea.bottom - chartArea.top);
                chart.draw();

                if (index < 0 || index >= window._chartValues.length) {
                    return;
                }

                const xScale = chart.scales.x;
                const yScale = chart.scales.y;
                const xPos = xScale.getPixelForValue(index);
                const yPos = yScale.getPixelForValue(window._chartValues[index]);

                // Вертикальная линия
                ctx2.beginPath();
                ctx2.moveTo(xPos, chartArea.top);
                ctx2.lineTo(xPos, chartArea.bottom);
                ctx2.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx2.lineWidth = 1;
                ctx2.setLineDash([4, 4]);
                ctx2.stroke();
                ctx2.setLineDash([]);

                // Горизонтальная линия
                ctx2.beginPath();
                ctx2.moveTo(chartArea.left, yPos);
                ctx2.lineTo(chartArea.right, yPos);
                ctx2.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx2.lineWidth = 1;
                ctx2.setLineDash([4, 4]);
                ctx2.stroke();
                ctx2.setLineDash([]);

                // Точка на графике
                ctx2.beginPath();
                ctx2.arc(xPos, yPos, 4, 0, 2 * Math.PI);
                ctx2.fillStyle = '#ffc107';
                ctx2.fill();
                ctx2.strokeStyle = '#ffffff';
                ctx2.lineWidth = 1;
                ctx2.stroke();

                // Подпись цены у горизонтальной линии
                const priceText = '$' + window._chartValues[index].toFixed(2);
                ctx2.font = '12px Arial';
                ctx2.fillStyle = '#ffc107';
                ctx2.textAlign = 'right';
                ctx2.textBaseline = 'bottom';
                ctx2.fillText(priceText, chartArea.right - 8, yPos - 6);
            }

            // Обновляем currentPrice
            if (prices.length > 0) {
                currentPrice = prices[prices.length - 1][1];
            }
        }

        async function updateChart(coinId, days) {
            const prices = await fetchChartData(coinId, days);

            if (prices.length === 0) {
                return;
            }

            currentPrice = prices[prices.length - 1][1];
            const prevPrice = prices[0][1];
            const change = prevPrice !== 0 ? ((currentPrice - prevPrice) / prevPrice * 100) : 0;
            const changeClass = change >= 0 ? 'green' : 'red';
            const changeText = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';

            const priceEl = document.getElementById('chartPriceDisplay');
            if (!isTouching) {
                priceEl.textContent = '$' + currentPrice.toFixed(2);
                priceEl.classList.remove('touch');
            }
            const changeEl = document.getElementById('chartChangeDisplay');
            changeEl.textContent = changeText;
            changeEl.className = 'chart-change-display ' + changeClass;

            const ctx = document.getElementById('priceChart').getContext('2d');

            if (chart) {
                chart.destroy();
                chart = null;
            }

            drawLineChart(ctx, prices);
        }

        function openChartPage(coinId) {
            currentCoinId = coinId;
            document.getElementById('appContainer').style.display = 'none';
            document.getElementById('chartPage').style.display = 'flex';
            document.getElementById('chartCoinTitle').textContent = getCoinDisplayName(coinId);

            document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.timeframe-btn[data-days="1"]').classList.add('active');
            currentDays = 1;
            isTouching = false;
            touchPrice = 0;

            updateChart(coinId, currentDays);

            if (updateInterval) {
                clearInterval(updateInterval);
            }
            updateInterval = setInterval(() => {
                updateChart(currentCoinId, currentDays);
            }, 60000);
        }

        document.getElementById('backFromChart').addEventListener('click', function() {
            if (updateInterval) {
                clearInterval(updateInterval);
                updateInterval = null;
            }
            document.getElementById('chartPage').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
        });

        // ===== ТАЙМФРЕЙМЫ =====
        document.querySelectorAll('.timeframe-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentDays = parseFloat(this.dataset.days);
                isTouching = false;
                touchPrice = 0;
                updateChart(currentCoinId, currentDays);
            });
        });

        // ===== МОНЕТЫ =====
        const coins = [
            { id: 'bitcoin', name: 'Bitcoin', symbol: 'btc', icon: '₿' },
            { id: 'ethereum', name: 'Ethereum', symbol: 'eth', icon: '⟠' },
            { id: 'ripple', name: 'XRP', symbol: 'xrp', icon: '✕' },
            { id: 'hyperliquid', name: 'Hype', symbol: 'hype', icon: '◆' }
        ];

        let coinCache = null;

        async function fetchCoinData() {
            try {
                if (coinCache) {
                    renderCoins(coinCache);
                }

                const ids = coins.map(c => c.id).join(',');
                const url =
                    `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`;
                const data = await fetchWithRetry(url);
                coinCache = data;
                renderCoins(data);

            } catch (e) {
                console.log('Ошибка загрузки данных монет:', e);
                if (!coinCache) {
                    document.getElementById('coinsList').innerHTML =
                        '<div class="loading">Ошибка загрузки данных. Повторная попытка...</div>';
                    setTimeout(fetchCoinData, 3000);
                }
            }
        }

        function renderCoins(data) {
            const list = document.getElementById('coinsList');
            list.innerHTML = '';

            coins.forEach((coin, index) => {
                const info = data[coin.id];
                if (!info) return;

                const price = info.usd;
                const change24h = info.usd_24h_change || 0;

                const change24hClass = change24h >= 0 ? 'green' : 'red';
                const change24hText = (change24h >= 0 ? '+' : '') + change24h.toFixed(2) + '%';

                const item = document.createElement('div');
                item.className = 'coin-item';
                item.innerHTML = `
                        <span class="coin-number">${index + 1}</span>
                        <div class="coin-icon ${coin.symbol}">${coin.icon}</div>
                        <div class="coin-info">
                            <div class="coin-name">${coin.name}</div>
                            <div class="coin-symbol">${coin.symbol.toUpperCase()}</div>
                        </div>
                        <div class="coin-price">$${price.toFixed(2)}</div>
                        <div class="coin-change-24h ${change24hClass}">${change24hText}</div>
                    `;
                item.addEventListener('click', function() {
                    openChartPage(coin.id);
                });
                list.appendChild(item);
            });
        }

        fetchCoinData();
        setInterval(fetchCoinData, 60000);
    </script>

</body>
</html>
