<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приложение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #000;
            overflow: hidden;
        }

        body {
            background-image: url('https://avatars.mds.yandex.net/get-entity_search/2356618/969838143/orig');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-btn {
            display: block;
            width: calc(100% - 32px);
            margin: 20px 16px 0 16px;
            padding: 14px 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(8px);
            text-align: center;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .top-btn:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.2);
        }

        .content {
            flex: 1;
            overflow: hidden;
            padding: 10px 16px 0 16px;
        }

        #mainPage {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .coins-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-bottom: 10px;
        }

        .coin-item {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
            cursor: pointer;
            transition: 0.2s;
            gap: 6px;
        }

        .coin-item:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.1);
        }

        .coin-number {
            color: rgba(255, 255, 255, 0.25);
            font-size: 10px;
            font-weight: bold;
            width: 16px;
            flex-shrink: 0;
        }

        .coin-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            flex-shrink: 0;
        }
        .coin-icon.btc { background: #f7931a; }
        .coin-icon.eth { background: #627eea; }
        .coin-icon.bnb { background: #f0b90b; }
        .coin-icon.xrp { background: #00aae4; }
        .coin-icon.sol { background: #9945ff; }
        .coin-icon.trx { background: #ef0027; }
        .coin-icon.hype { background: #8b5cf6; }

        .coin-info {
            flex: 1;
            min-width: 0;
        }
        .coin-name {
            color: #fff;
            font-size: 13px;
            font-weight: 600;
        }
        .coin-symbol {
            color: rgba(255, 255, 255, 0.35);
            font-size: 9px;
            text-transform: uppercase;
        }

        .coin-price {
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
            min-width: 55px;
            text-align: right;
        }

        .coin-change-24h {
            font-size: 11px;
            font-weight: 600;
            min-width: 45px;
            text-align: right;
            flex-shrink: 0;
        }
        .coin-change-24h.green { color: #4caf50; }
        .coin-change-24h.red { color: #f44336; }

        .loading {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 30px 0;
            font-size: 14px;
        }

        /* ===== СТРАНИЦА ИНДИКАТОРОВ ===== */
        #indicatorsPage {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e27;
            z-index: 999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #indicatorsPage .back-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            font-size: 20px;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
        }

        #indicatorsPage .back-btn:active {
            transform: scale(0.95);
            opacity: 0.7;
        }

        .gauge-container {
            position: relative;
            width: 280px;
            height: 200px;
            margin-top: 20px;
        }

        .gauge-container canvas {
            width: 100%;
            height: 100%;
        }

        .gauge-value {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 48px;
            font-weight: bold;
        }

        .gauge-status {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-top: 4px;
        }

        .gauge-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            margin-top: 8px;
        }

        /* ===== СТРАНИЦА ГРАФИКА ===== */
        #chartPage {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e27;
            z-index: 999;
            flex-direction: column;
            padding: 12px;
        }

        #chartPage .back-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            font-size: 20px;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
        }

        #chartPage .back-btn:active {
            transform: scale(0.95);
            opacity: 0.7;
        }

        #chartPage .chart-header {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin-top: 50px;
            margin-bottom: 4px;
        }

        #chartPage .chart-price-display {
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            transition: all 0.15s;
        }

        #chartPage .chart-price-display.touch {
            color: #ffc107;
        }

        #chartPage .chart-change-display {
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        #chartPage .chart-change-display.green { color: #4caf50; }
        #chartPage .chart-change-display.red { color: #f44336; }

        #chartPage .chart-container {
            flex: 1;
            width: 100%;
            min-height: 0;
            position: relative;
            touch-action: none;
        }

        #chartPage .chart-container canvas {
            width: 100% !important;
            height: 100% !important;
            touch-action: none;
        }

        #chartPage .timeframes {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            padding: 8px 0 12px 0;
            flex-shrink: 0;
        }

        #chartPage .timeframe-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 11px;
            font-weight: 600;
            padding: 5px 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        #chartPage .timeframe-btn.active {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
        }

        #chartPage .timeframe-btn:active {
            transform: scale(0.95);
        }

        /* ===== ПРОФИЛЬ ===== */
        #profilePage {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e27;
            z-index: 999;
            flex-direction: column;
            padding: 20px;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px 20px;
            margin-top: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 320px;
            align-self: center;
            width: 100%;
        }

        .profile-row {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar-box {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.15);
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .avatar-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-box .avatar-placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            text-align: center;
            line-height: 1.2;
        }

        .avatar-input {
            display: none;
        }

        .profile-fields {
            flex: 1;
        }

        .profile-fields .label {
            color: rgba(255, 255, 255, 0.4);
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 2px;
            display: block;
        }

        .profile-fields input {
            width: 100%;
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .profile-fields input:focus {
            border-color: #f7931a;
        }
    </style>
</head>
<body>

    <div class="app" id="appContainer">
        <button class="top-btn" id="mainBtn">Индикаторы</button>

        <div class="content">
            <div id="mainPage">
                <div class="coins-list" id="coinsList">
                    <div class="loading">Загрузка данных...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== СТРАНИЦА ИНДИКАТОРОВ ===== -->
    <div id="indicatorsPage">
        <button class="back-btn" id="backFromIndicators">←</button>
        <div style="color:#fff; font-size:22px; font-weight:bold; text-align:center; margin-top:50px;">Индикатор страха и жадности</div>
        <div class="gauge-container">
            <canvas id="gaugeCanvas"></canvas>
            <div class="gauge-value" id="gaugeValue">50</div>
        </div>
        <div class="gauge-status" id="gaugeStatus">Нейтрально</div>
        <div class="gauge-label">Источник: alternative.me</div>
    </div>

    <!-- ===== СТРАНИЦА ГРАФИКА ===== -->
    <div id="chartPage">
        <button class="back-btn" id="backFromChart">←</button>

        <div class="chart-header" id="chartCoinTitle">Bitcoin</div>
        <div class="chart-price-display" id="chartPriceDisplay">$0.00</div>
        <div class="chart-change-display" id="chartChangeDisplay">+0.00%</div>
        <div class="chart-container" id="chartContainer">
            <canvas id="priceChart"></canvas>
        </div>
        <div class="timeframes" id="timeframesContainer">
            <button class="timeframe-btn" data-days="0.166">4ч</button>
            <button class="timeframe-btn" data-days="0.5">12ч</button>
            <button class="timeframe-btn active" data-days="1">1д</button>
            <button class="timeframe-btn" data-days="7">1н</button>
            <button class="timeframe-btn" data-days="30">1м</button>
            <button class="timeframe-btn" data-days="90">3м</button>
            <button class="timeframe-btn" data-days="180">6м</button>
            <button class="timeframe-btn" data-days="365">1г</button>
        </div>
    </div>

    <!-- ===== ПРОФИЛЬ ===== -->
    <div id="profilePage">
        <div class="profile-card">
            <div class="profile-row">
                <div class="avatar-box" id="avatarBox">
                    <div class="avatar-placeholder" id="avatarPlaceholder">Загрузить</div>
                    <img id="avatarImage" style="display:none;">
                </div>
                <input type="file" class="avatar-input" id="avatarInput" accept="image/*">

                <div class="profile-fields">
                    <div class="field-group">
                        <span class="label">Никнейм</span>
                        <input type="text" id="nicknameInput" placeholder="Введите никнейм">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ===== КНОПКА ИНДИКАТОРЫ =====
        document.getElementById('mainBtn').addEventListener('click', function() {
            document.getElementById('appContainer').style.display = 'none';
            document.getElementById('indicatorsPage').style.display = 'flex';
            loadFearGreed();
        });

        document.getElementById('backFromIndicators').addEventListener('click', function() {
            document.getElementById('indicatorsPage').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
        });

        // ===== АВАТАРКА =====
        const avatarBox = document.getElementById('avatarBox');
        const avatarInput = document.getElementById('avatarInput');
        const avatarImage = document.getElementById('avatarImage');
        const avatarPlaceholder = document.getElementById('avatarPlaceholder');

        avatarBox.addEventListener('click', function() {
            avatarInput.click();
        });

        avatarInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    avatarImage.src = event.target.result;
                    avatarImage.style.display = 'block';
                    avatarPlaceholder.style.display = 'none';
                    localStorage.setItem('user_avatar', event.target.result);
                };
                reader.readAsDataURL(file);
            }
        });

        // ===== НИКНЕЙМ =====
        const nicknameInput = document.getElementById('nicknameInput');

        nicknameInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const nickname = nicknameInput.value.trim();
                if (nickname) {
                    localStorage.setItem('user_nickname', nickname);
                    tg.showAlert('Никнейм сохранён!');
                } else {
                    tg.showAlert('Введите никнейм');
                }
            }
        });

        function loadProfileData() {
            const savedAvatar = localStorage.getItem('user_avatar');
            if (savedAvatar) {
                avatarImage.src = savedAvatar;
                avatarImage.style.display = 'block';
                avatarPlaceholder.style.display = 'none';
            }

            const savedNickname = localStorage.getItem('user_nickname');
            if (savedNickname) {
                nicknameInput.value = savedNickname;
            }
        }

        // ===== СТРАХ И ЖАДНОСТЬ =====
        let gaugeDrawn = false;

        async function loadFearGreed() {
            try {
                const response = await fetch('https://api.alternative.me/fng/?limit=1');
                const data = await response.json();
                const value = parseInt(data.data[0].value);
                const classification = data.data[0].value_classification;

                document.getElementById('gaugeValue').textContent = value;
                document.getElementById('gaugeStatus').textContent = classification;

                if (!gaugeDrawn) {
                    drawGauge(value);
                    gaugeDrawn = true;
                } else {
                    updateGauge(value);
                }
            } catch (e) {
                document.getElementById('gaugeValue').textContent = '--';
                document.getElementById('gaugeStatus').textContent = 'Ошибка загрузки';
                console.log('Ошибка загрузки страха и жадности:', e);
            }
        }

        function drawGauge(value) {
            const canvas = document.getElementById('gaugeCanvas');
            const ctx = canvas.getContext('2d');

            const rect = canvas.parentElement.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            ctx.scale(dpr, dpr);

            const w = rect.width;
            const h = rect.height;
            const centerX = w / 2;
            const centerY = h - 10;
            const radius = Math.min(w, h * 1.5) * 0.42;

            const startAngle = Math.PI * 0.75;
            const endAngle = Math.PI * 0.25;
            const totalAngle = startAngle - endAngle;

            const gradient = ctx.createLinearGradient(0, 0, w, 0);
            gradient.addColorStop(0, '#f44336');
            gradient.addColorStop(0.5, '#ffc107');
            gradient.addColorStop(1, '#4caf50');

            // Серая подложка
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, endAngle, startAngle);
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 18;
            ctx.lineCap = 'round';
            ctx.stroke();

            // Цветная дуга
            const percent = Math.min(Math.max(value, 0), 100) / 100;
            const currentAngle = endAngle + totalAngle * (1 - percent);

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, currentAngle, startAngle);
            ctx.strokeStyle = gradient;
            ctx.lineWidth = 18;
            ctx.lineCap = 'round';
            ctx.stroke();

            // Точка на конце
            const pointAngle = currentAngle;
            const pointX = centerX + radius * Math.cos(pointAngle);
            const pointY = centerY + radius * Math.sin(pointAngle);

            ctx.beginPath();
            ctx.arc(pointX, pointY, 6, 0, 2 * Math.PI);
            ctx.fillStyle = '#ffffff';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(pointX, pointY, 3, 0, 2 * Math.PI);
            ctx.fillStyle = '#ffc107';
            ctx.fill();

            // Деления
            const steps = 10;
            for (let i = 0; i <= steps; i++) {
                const p = i / steps;
                const angle = endAngle + totalAngle * (1 - p);
                const innerR = radius - 12;
                const outerR = radius - 6;
                const x1 = centerX + innerR * Math.cos(angle);
                const y1 = centerY + innerR * Math.sin(angle);
                const x2 = centerX + outerR * Math.cos(angle);
                const y2 = centerY + outerR * Math.sin(angle);

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();

                const labelR = radius - 28;
                const labelX = centerX + labelR * Math.cos(angle);
                const labelY = centerY + labelR * Math.sin(angle);
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.font = '10px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const labelValue = Math.round(p * 100);
                if (labelValue % 20 === 0) {
                    ctx.fillText(labelValue, labelX, labelY);
                }
            }
        }

        function updateGauge(value) {
            const canvas = document.getElementById('gaugeCanvas');
            const ctx = canvas.getContext('2d');

            const rect = canvas.parentElement.getBoundingClientRect();
            const w = rect.width;
            const h = rect.height;
            const centerX = w / 2;
            const centerY = h - 10;
            const radius = Math.min(w, h * 1.5) * 0.42;

            const startAngle = Math.PI * 0.75;
            const endAngle = Math.PI * 0.25;
            const totalAngle = startAngle - endAngle;

            const gradient = ctx.createLinearGradient(0, 0, w, 0);
            gradient.addColorStop(0, '#f44336');
            gradient.addColorStop(0.5, '#ffc107');
            gradient.addColorStop(1, '#4caf50');

            ctx.clearRect(0, 0, w, h);

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, endAngle, startAngle);
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 18;
            ctx.lineCap = 'round';
            ctx.stroke();

            const percent = Math.min(Math.max(value, 0), 100) / 100;
            const currentAngle = endAngle + totalAngle * (1 - percent);

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, currentAngle, startAngle);
            ctx.strokeStyle = gradient;
            ctx.lineWidth = 18;
            ctx.lineCap = 'round';
            ctx.stroke();

            const pointAngle = currentAngle;
            const pointX = centerX + radius * Math.cos(pointAngle);
            const pointY = centerY + radius * Math.sin(pointAngle);

            ctx.beginPath();
            ctx.arc(pointX, pointY, 6, 0, 2 * Math.PI);
            ctx.fillStyle = '#ffffff';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(pointX, pointY, 3, 0, 2 * Math.PI);
            ctx.fillStyle = '#ffc107';
            ctx.fill();

            const steps = 10;
            for (let i = 0; i <= steps; i++) {
                const p = i / steps;
                const angle = endAngle + totalAngle * (1 - p);
                const innerR = radius - 12;
                const outerR = radius - 6;
                const x1 = centerX + innerR * Math.cos(angle);
                const y1 = centerY + innerR * Math.sin(angle);
                const x2 = centerX + outerR * Math.cos(angle);
                const y2 = centerY + outerR * Math.sin(angle);

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();

                const labelR = radius - 28;
                const labelX = centerX + labelR * Math.cos(angle);
                const labelY = centerY + labelR * Math.sin(angle);
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.font = '10px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const labelValue = Math.round(p * 100);
                if (labelValue % 20 === 0) {
                    ctx.fillText(labelValue, labelX, labelY);
                }
            }
        }

        // ===== ГРАФИК =====
        let chart = null;
        let currentCoinId = 'bitcoin';
        let currentDays = 1;
        let updateInterval = null;
        let currentPrice = 0;
        let isTouching = false;
        let touchPrice = 0;

        function getCoinDisplayName(coinId) {
            const map = {
                'bitcoin': 'Bitcoin',
                'ethereum': 'Ethereum',
                'binancecoin': 'BNB',
                'ripple': 'XRP',
                'solana': 'Solana',
                'tron': 'TRX',
                'hyperliquid': 'Hype'
            };
            return map[coinId] || coinId;
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
        }

        async function fetchWithRetry(url, retries = 3) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url);
                    if (response.ok) {
                        return await response.json();
                    }
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, 1000 * (i + 1)));
                }
            }
            throw new Error('Не удалось загрузить данные');
        }

        async function fetchChartData(coinId, days) {
            try {
                let actualDays = days;
                if (days === 365 || days === 180) actualDays = Math.min(days, 365);

                const url =
                    `https://api.coingecko.com/api/v3/coins/${coinId}/market_chart?vs_currency=usd&days=${actualDays}`;
                const data = await fetchWithRetry(url);
                return data.prices || [];
            } catch (e) {
                console.log('Ошибка загрузки данных графика:', e);
                return [];
            }
        }
